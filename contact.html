<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
padding-top:158px;
}

.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
transform:translateY(0);
transition:transform .35s ease;
will-change:transform;
}

.lang-top{
padding:12px 14px 10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
font-size:0;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:var(--white);
border:1px solid #333;
transition:.25s;
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

.page-hero{
padding:32px 18px 24px;
}

.page-hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:28px 20px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.page-title{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.page-sub{
font-size:18px;
color:var(--soft);
line-height:1.5;
}

.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

.info-box{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:24px 20px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
text-align:left;
}

.info-box h3{
font-size:26px;
font-weight:900;
margin-bottom:12px;
}

.info-box p{
font-size:17px;
line-height:1.7;
color:#d7d7d7;
}

.email-link{
font-size:20px;
font-weight:900;
color:#22c55e;
text-decoration:none;
word-break:break-word;
}

.footer{
padding:30px;
font-size:14px;
color:#999;
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">
  <div class="lang-top">
    <div class="lang-wrap">
      <div class="lang-buttons" id="languageSelector"></div>
    </div>
  </div>

  <div class="header">
    <div class="brand" id="siteName"></div>

    <div class="nav">
      <button onclick="location.href='index.html'" id="navHome"></button>
      <button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
      <button onclick="location.href='about.html'" id="navAbout"></button>
      <button class="active" id="navContact"></button>
    </div>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-box">
    <div class="page-title" id="pageTitle"></div>
    <div class="page-sub" id="pageSub"></div>
  </div>
</div>

<div class="container">
  <div class="info-box">
    <h3 id="box1Title"></h3>
    <p id="box1Text"></p>
  </div>

  <div class="info-box">
    <h3 id="box2Title"></h3>
    <p id="box2Text"></p>
  </div>

  <div class="info-box">
    <h3>Contact Email</h3>
    <p>
      <a class="email-link" href="mailto:ronaldolimaymanta5@gmail.com">
        ronaldolimaymanta5@gmail.com
      </a>
    </p>
  </div>
</div>

<div class="footer">© Football Quiz</div>

<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function applyContactTranslations(){
  document.documentElement.lang = getSavedLanguage();
  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");
  document.getElementById("pageTitle").innerText = t("contact_title");
  document.getElementById("pageSub").innerText = t("contact_subtitle");
  document.getElementById("box1Title").innerText = t("contact_box_1_title");
  document.getElementById("box1Text").innerText = t("contact_box_1_text");
  document.getElementById("box2Title").innerText = t("contact_box_2_title");
  document.getElementById("box2Text").innerText = t("contact_box_2_text");
}

buildLanguageSelector("languageSelector");
applyContactTranslations();

const topUI = document.getElementById("topUI");
function updateTopPadding(){ document.body.style.paddingTop = (topUI.offsetHeight + 12) + "px"; }
function hideTopUI(){ topUI.style.transform = `translateY(-${topUI.offsetHeight}px)`; }
function showTopUI(){ topUI.style.transform = "translateY(0)"; }

updateTopPadding();
window.addEventListener("load", updateTopPadding);
window.addEventListener("resize", updateTopPadding);

let lastScroll = 0;
window.addEventListener("scroll", () => {
  const currentScroll = window.scrollY || window.pageYOffset;
  if(currentScroll > lastScroll && currentScroll > 80){ hideTopUI(); }
  else if(currentScroll < 10){ showTopUI(); }
  lastScroll = currentScroll <= 0 ? 0 : currentScroll;
}, { passive: true });
</script>

</body>
</html>
