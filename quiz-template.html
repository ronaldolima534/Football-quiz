<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#0b0b0b;
--card:#151515;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:#fff;
text-align:center;
padding-top:110px;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:99;
padding:18px 12px;
background:rgba(10,10,10,.92);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
transition:transform .35s ease;
}

.header.hide{
transform:translateY(-100%);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 14px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#1d1d1d;
color:#fff;
border:1px solid var(--line);
}

.title-wrap{
padding:24px 14px 14px;
}

.title-bar{
width:94%;
max-width:760px;
margin:auto;
background:#151515;
border:1px solid var(--line);
padding:22px;
border-radius:24px;
font-size:28px;
font-weight:900;
box-shadow:0 14px 30px rgba(0,0,0,.35);
}

.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

.progress-wrap{
height:14px;
background:#1a1a1a;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
border:1px solid var(--line);
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green2),var(--green));
transition:.55s ease;
}

.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}

.easy{background:#15803d;}
.medium{background:#d97706;}
.hard{background:#dc2626;}

.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 16px 34px rgba(0,0,0,.35);
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:1;
transition:opacity .3s ease, transform .3s ease;
}

.fade{
opacity:0;
transform:scale(.95);
}

.counter{
margin-top:18px;
font-size:28px;
font-weight:900;
}

.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:18px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
transition:.25s;
}

.green{
background:linear-gradient(145deg,var(--green),var(--green2));
color:#000;
}

.gray{
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.final-box{
display:none;
margin-top:24px;
background:#151515;
border:1px solid var(--line);
padding:24px;
border-radius:24px;
}

.final-box h2{
font-size:32px;
margin-bottom:18px;
}

.guess-options{
display:grid;
gap:12px;
}

.guess-btn{
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.after-choice{
display:none;
margin-top:18px;
}

.footer{
padding:28px;
font-size:14px;
color:#888;
}

@media(max-width:600px){
.brand{font-size:28px;}
.title-bar{font-size:22px;}
.counter{font-size:22px;}
.btn{font-size:19px;padding:16px;}
}
</style>
</head>

<body>

<div class="header">
<div class="brand">Football Quiz</div>

<div class="nav">
<button onclick="location.href='index.html'">HOME</button>
<button onclick="location.href='categories.html'">CATEGORIES</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>
</div>

<div class="title-wrap">
<div class="title-bar" id="quizTitle"></div>
</div>

<div class="container">

<div class="progress-wrap">
<div class="progress" id="progressBar"></div>
</div>

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons" id="gameButtons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="location.href='index.html'">BACK HOME</button>
</div>

<div class="final-box" id="finalBox">
<h2>How many did you guess?</h2>

<div class="guess-options">
<button class="guess-btn" onclick="finishChoice()">0 - 5</button>
<button class="guess-btn" onclick="finishChoice()">6 - 10</button>
<button class="guess-btn" onclick="finishChoice()">11 - 14</button>
<button class="guess-btn" onclick="finishChoice()">I GOT ALL 15 🔥</button>
</div>

<div class="after-choice" id="afterChoice">
<div class="buttons">
<button class="btn green" onclick="location.reload()">PLAY AGAIN</button>
<button class="btn gray" onclick="location.href='index.html'">HOME</button>
</div>
</div>
</div>

</div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>

<script>
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "transfers";
const quiz = quizData[mode];

if (!quiz) {
  alert("Quiz not found");
  location.href = "index.html";
}

document.getElementById("quizTitle").innerText = quiz.title;

let current = 1;
let showing = false;
let selectedQuestions = [];

function shuffleArray(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRandomNumbers(total, count){
  const numbers = [];
  for(let i = 1; i <= total; i++){
    numbers.push(i);
  }
  return shuffleArray(numbers).slice(0, count);
}

function buildQuestionSet(){
  const easySet = pickRandomNumbers(quiz.totalEasy, 5).map(num => ({
    level: "easy",
    number: num
  }));

  const mediumSet = pickRandomNumbers(quiz.totalMedium, 5).map(num => ({
    level: "medium",
    number: num
  }));

  const hardSet = pickRandomNumbers(quiz.totalHard, 5).map(num => ({
    level: "hard",
    number: num
  }));

  selectedQuestions = [...easySet, ...mediumSet, ...hardSet];
}

function getCurrentQuestion(){
  return selectedQuestions[current - 1];
}

function getLevel(){
  return getCurrentQuestion().level;
}

function getNumber(){
  return getCurrentQuestion().number;
}

function updateBadge(){
  const badge = document.getElementById("difficulty");
  const level = getLevel();

  badge.className = "badge";

  if(level === "easy"){
    badge.innerText = "EASY";
    badge.classList.add("easy");
  }else if(level === "medium"){
    badge.innerText = "MEDIUM";
    badge.classList.add("medium");
  }else{
    badge.innerText = "HARD";
    badge.classList.add("hard");
  }
}

function updateProgress(){
  document.getElementById("progressBar").style.width =
    (current / 15 * 100) + "%";
}

function preloadImage(src){
  const img = new Image();
  img.src = src;
}

function preloadCurrentPair(){
  const level = getLevel();
  const number = getNumber();

  preloadImage(`${quiz.folder}/${level}/${quiz.questionPrefix}${number}.png`);
  preloadImage(`${quiz.folder}/${level}/${quiz.answerPrefix}${number}.png`);
}

function preloadNextQuestion(){
  if(current >= 15) return;

  const nextQuestion = selectedQuestions[current];
  if(!nextQuestion) return;

  preloadImage(`${quiz.folder}/${nextQuestion.level}/${quiz.questionPrefix}${nextQuestion.number}.png`);
  preloadImage(`${quiz.folder}/${nextQuestion.level}/${quiz.answerPrefix}${nextQuestion.number}.png`);
}

function swapImage(src){
  const img = document.getElementById("quizImage");

  const preload = new Image();
  preload.onload = function(){
    img.classList.add("fade");

    setTimeout(() => {
      img.src = src;
      img.classList.remove("fade");
    }, 150);
  };

  preload.src = src;
}

function loadQuestion(){
  swapImage(
    `${quiz.folder}/${getLevel()}/${quiz.questionPrefix}${getNumber()}.png`
  );
}

function loadAnswer(){
  swapImage(
    `${quiz.folder}/${getLevel()}/${quiz.answerPrefix}${getNumber()}.png`
  );
}

function mainAction(){
  const btn = document.getElementById("mainBtn");

  if(!showing){
    loadAnswer();
    btn.innerText = current === 15 ? "FINISH" : "NEXT";
    showing = true;
    preloadNextQuestion();
  }else{
    if(current === 15){
      endQuiz();
      return;
    }

    current++;
    showing = false;

    updateBadge();
    updateProgress();
    loadQuestion();
    preloadCurrentPair();
    preloadNextQuestion();

    document.getElementById("counter").innerText =
      "QUESTION " + current + " / 15";

    btn.innerText = "ANSWER";
  }
}

function endQuiz(){
  document.getElementById("difficulty").style.display = "none";
  document.querySelector(".viewer").style.display = "none";
  document.getElementById("counter").style.display = "none";
  document.getElementById("gameButtons").style.display = "none";
  document.getElementById("finalBox").style.display = "block";
}

function finishChoice(){
  document.getElementById("afterChoice").style.display = "block";
}

buildQuestionSet();
updateBadge();
updateProgress();
preloadCurrentPair();
preloadNextQuestion();
loadQuestion();

/* header inteligente */
let lastScroll = 0;
const header = document.querySelector(".header");

window.addEventListener("scroll", () => {
  let currentScroll = window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 80){
    header.classList.add("hide");
  }

  if(currentScroll < 20){
    header.classList.remove("hide");
  }

  lastScroll = currentScroll;
});
</script>

</body>
</html>
