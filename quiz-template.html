<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HEADER */
.header{
background:#151515;
border-bottom:1px solid #2a2a2a;
box-shadow:0 4px 10px rgba(0,0,0,.25);
padding:18px 12px;
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:15px;
font-weight:900;
border:none;
border-radius:12px;
cursor:pointer;
background:#232323;
color:white;
border:1px solid #333;
}

.nav .active{
background:#39ff14;
color:black;
border:none;
}

/* TITLE */
.title-wrap{
padding:28px 15px 14px;
}

.title-bar{
width:94%;
max-width:720px;
margin:auto;
background:#171717;
border:1px solid #2b2b2b;
padding:18px;
border-radius:22px;
font-size:28px;
font-weight:900;
line-height:1.2;
}

/* MAIN */
.container{
width:94%;
max-width:720px;
margin:auto;
padding-bottom:60px;
}

/* PROGRESS */
.progress-wrap{
height:14px;
background:#222;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
}

.progress{
height:100%;
width:6%;
background:#39ff14;
transition:.3s;
}

/* BADGE */
.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
font-size:22px;
font-weight:900;
margin-bottom:18px;
}

.easy{background:#22c55e;}
.medium{background:#f59e0b;}
.hard{background:#ef4444;}

/* VIEWER */
.viewer{
background:#171717;
border:1px solid #2b2b2b;
padding:14px;
border-radius:24px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* COUNTER */
.counter{
margin-top:18px;
font-size:30px;
font-weight:900;
}

/* BUTTONS */
.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:18px;
font-size:24px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
}

.gray{
background:#232323;
color:white;
border:1px solid #333;
}

/* FINAL SCREEN */
.final-box{
display:none;
background:#171717;
border:1px solid #2b2b2b;
padding:24px;
border-radius:24px;
margin-top:24px;
}

.final-box h2{
font-size:34px;
margin-bottom:20px;
}

.guess-options{
display:grid;
gap:12px;
margin-bottom:18px;
}

.guess-btn{
padding:16px;
font-size:22px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#232323;
color:white;
border:1px solid #333;
}

.guess-btn:hover{
border-color:#39ff14;
}

.after-choice{
display:none;
margin-top:18px;
}

.after-choice p{
font-size:24px;
font-weight:900;
margin-bottom:16px;
}

/* SUGGESTIONS */
.suggest-title{
margin-top:36px;
padding-top:26px;
border-top:1px solid #2b2b2b;
font-size:30px;
font-weight:900;
}

.suggest{
display:grid;
gap:18px;
margin-top:18px;
}

.card{
background:#171717;
border:1px solid #2b2b2b;
padding:14px;
border-radius:22px;
}

.thumb{
height:205px;
border-radius:16px;
overflow:hidden;
margin-bottom:12px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.s-title{
font-size:22px;
font-weight:900;
line-height:1.2;
margin-bottom:12px;
}

/* FOOTER */
.footer{
padding:34px 15px;
font-size:14px;
color:#999;
}

@media(max-width:600px){

.brand{font-size:30px;}

.nav button{
font-size:13px;
padding:9px 12px;
}

.title-bar{
font-size:22px;
}

.counter{
font-size:24px;
}

.btn{
font-size:21px;
padding:16px;
}

.final-box h2{
font-size:28px;
}

.guess-btn{
font-size:18px;
}

.thumb{
height:180px;
}
}
</style>
</head>

<body>

<div class="header">

<div class="brand">Football Quiz</div>

<div class="nav">
<button onclick="location.href='index.html'">HOME</button>
<button onclick="location.href='categories.html'">CATEGORIES</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>

</div>

<div class="title-wrap">
<div class="title-bar" id="quizTitle"></div>
</div>

<div class="container">

<div class="progress-wrap">
<div class="progress" id="progressBar"></div>
</div>

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons" id="gameButtons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="location.href='index.html'">BACK HOME</button>
</div>

<div class="final-box" id="finalBox">

<h2>How many did you guess?</h2>

<div class="guess-options">

<button class="guess-btn" onclick="finishChoice()">0 - 5</button>
<button class="guess-btn" onclick="finishChoice()">6 - 10</button>
<button class="guess-btn" onclick="finishChoice()">11 - 14</button>
<button class="guess-btn" onclick="finishChoice()">I GOT ALL 15 🔥</button>

</div>

<div class="after-choice" id="afterChoice">

<p>Great job! Play another quiz.</p>

<div class="buttons">
<button class="btn green" onclick="location.reload()">PLAY AGAIN</button>
<button class="btn gray" onclick="location.href='categories.html'">NEW QUIZ</button>
<button class="btn gray" onclick="location.href='index.html'">HOME</button>
</div>

</div>

</div>

<div class="suggest-title">MORE QUIZZES</div>
<div class="suggest" id="suggestions"></div>

</div>

<div class="footer">© Football Quiz</div>

<script>
const params = new URLSearchParams(location.search);
const mode = params.get("mode");

const data = {

"transfers":{
title:"GUESS THE PLAYER BY THEIR TRANSFERS",
folder:"images/transfers",
others:[
["player-clues","images/thumbnails/quiz2.jpg","GUESS THE PLAYER BY NATIONALITY + CLUB + NUMBER + POSITION"],
["nationality-club","images/thumbnails/quiz3.jpg","GUESS THE CLUB BY PLAYERS NATIONALITY"]
]},

"player-clues":{
title:"GUESS THE PLAYER BY NATIONALITY + CLUB + NUMBER + POSITION",
folder:"images/player-clues",
others:[
["transfers","images/thumbnails/quiz1.jpg","GUESS THE PLAYER BY THEIR TRANSFERS"],
["nationality-club","images/thumbnails/quiz3.jpg","GUESS THE CLUB BY PLAYERS NATIONALITY"]
]},

"nationality-club":{
title:"GUESS THE CLUB BY PLAYERS NATIONALITY",
folder:"images/nationality-club",
others:[
["transfers","images/thumbnails/quiz1.jpg","GUESS THE PLAYER BY THEIR TRANSFERS"],
["player-clues","images/thumbnails/quiz2.jpg","GUESS THE PLAYER BY NATIONALITY + CLUB + NUMBER + POSITION"]
]}
};

const quiz = data[mode];

let current = 1;
let showing = false;

document.getElementById("quizTitle").innerText = quiz.title;

function getDiff(){
if(current <= 5) return "easy";
if(current <= 10) return "medium";
return "hard";
}

function updateDiff(){
const badge = document.getElementById("difficulty");
badge.className = "badge";

if(current <= 5){
badge.innerText="EASY";
badge.classList.add("easy");
}else if(current <= 10){
badge.innerText="MEDIUM";
badge.classList.add("medium");
}else{
badge.innerText="HARD";
badge.classList.add("hard");
}
}

function updateProgress(){
document.getElementById("progressBar").style.width =
(current/15*100) + "%";
}

function loadCareer(){
document.getElementById("quizImage").src =
quiz.folder + "/" + getDiff() + "/career" + current + ".png";
}

function loadPlayer(){
document.getElementById("quizImage").src =
quiz.folder + "/" + getDiff() + "/player" + current + ".png";
}

function mainAction(){

if(!showing){

loadPlayer();

document.getElementById("mainBtn").innerText =
(current===15) ? "FINISH" : "NEXT";

showing = true;

}else{

if(current===15){
endQuiz();
return;
}

current++;
showing=false;

loadCareer();
updateDiff();
updateProgress();

document.getElementById("counter").innerText =
"QUESTION " + current + " / 15";

document.getElementById("mainBtn").innerText="ANSWER";
}
}

function endQuiz(){
document.getElementById("difficulty").style.display="none";
document.querySelector(".viewer").style.display="none";
document.getElementById("counter").style.display="none";
document.getElementById("gameButtons").style.display="none";
document.getElementById("finalBox").style.display="block";
}

function finishChoice(){
document.getElementById("afterChoice").style.display="block";
}

function buildSuggestions(){

let html="";

quiz.others.forEach(q=>{

html += `
<div class="card">
<div class="thumb">
<img src="${q[1]}">
</div>
<div class="s-title">${q[2]}</div>
<button class="btn green"
onclick="location.href='quiz-template.html?mode=${q[0]}'">
PLAY NOW
</button>
</div>
`;

});

document.getElementById("suggestions").innerHTML=html;
}

updateDiff();
updateProgress();
loadCareer();
buildSuggestions();
</script>

</body>
</html>
