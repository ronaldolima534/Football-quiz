<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.png') center/cover fixed;
text-align:center;
color:white;
}

/* LOGO SOLO */
.top-logo{
padding:16px 10px 8px;
}

.logo{
width:260px;
max-width:86%;
display:block;
margin:auto;
}

/* TITULO SEPARADO */
.title-bar{
background:rgba(39,24,126,.92);
padding:16px;
border-radius:22px;
font-size:26px;
font-weight:900;
line-height:1.15;
width:94%;
max-width:620px;
margin:auto;
}

/* CONTENIDO */
.container{
width:94%;
max-width:620px;
margin:auto;
padding:18px 0 50px;
}

/* DIFICULTAD */
.badge{
display:inline-block;
padding:10px 22px;
border-radius:999px;
font-size:24px;
font-weight:900;
margin-bottom:16px;
}

.easy{background:#22c55e;}
.medium{background:#f59e0b;}
.hard{background:#ef4444;}

/* VISOR */
.viewer{
background:#27187e;
padding:14px;
border-radius:22px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* QUESTION COLOR */
.counter{
margin-top:16px;
font-size:28px;
font-weight:900;
color:#ffe600;
text-shadow:0 2px 6px rgba(0,0,0,.35);
}

.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:20px;
font-size:30px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
}

.gray{
background:#27187e;
color:white;
box-shadow:0 8px #1d115b;
}

/* TITULO SUGERENCIAS */
.suggest-title{
margin-top:30px;
font-size:26px;
font-weight:900;
color:#ffe600;
text-shadow:0 2px 6px rgba(0,0,0,.35);
}

/* TARJETAS SUGERIDAS */
.suggest{
display:grid;
gap:16px;
margin-top:16px;
}

.card{
background:#27187e;
padding:14px;
border-radius:22px;
}

.thumb{
height:205px;
border-radius:16px;
overflow:hidden;
margin-bottom:12px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.s-title{
font-size:22px;
font-weight:900;
line-height:1.15;
margin-bottom:12px;
}
</style>
</head>

<body>

<div class="top-logo">
<img src="LOGO.png" class="logo">
</div>

<div class="title-bar" id="quizTitle"></div>

<div class="container">

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="location.href='index.html'">BACK HOME</button>
</div>

<div class="suggest-title">SIMILAR QUIZZES</div>

<div class="suggest" id="suggestions"></div>

</div>

<script>
const params=new URLSearchParams(location.search);
const mode=params.get("mode");

const data={

"transfers":{
title:"GUESS THE PLAYER BY THEIR TRANSFERS",
folder:"images/transfers",
others:[
["player-clues","images/thumbnails/quiz2.jpg","GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION"],
["nationality-club","images/thumbnails/quiz3.jpg","GUESS THE CLUB BY PLAYERS NATIONALITY"]
]},

"player-clues":{
title:"GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION",
folder:"images/player-clues",
others:[
["transfers","images/thumbnails/quiz1.jpg","GUESS THE PLAYER BY THEIR TRANSFERS"],
["nationality-club","images/thumbnails/quiz3.jpg","GUESS THE CLUB BY PLAYERS NATIONALITY"]
]},

"nationality-club":{
title:"GUESS THE CLUB BY PLAYERS NATIONALITY",
folder:"images/nationality-club",
others:[
["transfers","images/thumbnails/quiz1.jpg","GUESS THE PLAYER BY THEIR TRANSFERS"],
["player-clues","images/thumbnails/quiz2.jpg","GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION"]
]}
};

const quiz=data[mode];

let current=1;
let showing=false;

document.getElementById("quizTitle").innerText=quiz.title;

function diff(){
if(current<=5)return "easy";
if(current<=10)return "medium";
return "hard";
}

function updateDiff(){
let b=document.getElementById("difficulty");
b.className="badge";

if(current<=5){
b.innerText="EASY";
b.classList.add("easy");
}else if(current<=10){
b.innerText="MEDIUM";
b.classList.add("medium");
}else{
b.innerText="HARD";
b.classList.add("hard");
}
}

function loadCareer(){
document.getElementById("quizImage").src=
quiz.folder+"/"+diff()+"/career"+current+".png";
}

function loadPlayer(){
document.getElementById("quizImage").src=
quiz.folder+"/"+diff()+"/player"+current+".png";
}

function mainAction(){

if(!showing){

loadPlayer();

document.getElementById("mainBtn").innerText=
(current===15)?"PLAY AGAIN":"NEXT";

showing=true;

}else{

if(current===15){
location.reload();
return;
}

current++;
showing=false;

loadCareer();
updateDiff();

document.getElementById("counter").innerText=
"QUESTION "+current+" / 15";

document.getElementById("mainBtn").innerText="ANSWER";
}
}

function buildSuggestions(){

let html="";

quiz.others.forEach(q=>{

html+=`
<div class="card">
<div class="thumb">
<img src="${q[1]}">
</div>
<div class="s-title">${q[2]}</div>
<button class="btn green"
onclick="location.href='quiz-template.html?mode=${q[0]}'">
PLAY
</button>
</div>
`;

});

document.getElementById("suggestions").innerHTML=html;
}

updateDiff();
loadCareer();
buildSuggestions();
</script>

</body>
</html>
