<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#0b0b0b;
--card:#151515;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#fff;
--soft:#a8a8a8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:white;
text-align:center;
}

.header{
background:rgba(10,10,10,.95);
border-bottom:1px solid var(--line);
padding:18px 12px;
position:sticky;
top:0;
z-index:10;
backdrop-filter:blur(8px);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 14px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#1d1d1d;
color:white;
border:1px solid var(--line);
}

.title-wrap{
padding:24px 14px 14px;
}

.title-bar{
width:94%;
max-width:760px;
margin:auto;
background:var(--card);
border:1px solid var(--line);
padding:22px;
border-radius:24px;
font-size:28px;
font-weight:900;
}

.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

.progress-wrap{
height:14px;
background:#1d1d1d;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
border:1px solid var(--line);
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green2),var(--green));
transition:.3s;
}

.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}

.easy{background:#15803d;}
.medium{background:#d97706;}
.hard{background:#dc2626;}

.viewer{
background:var(--card);
border:1px solid var(--line);
padding:16px;
border-radius:26px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.counter{
margin-top:18px;
font-size:28px;
font-weight:900;
}

.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:18px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
}

.green{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
}

.gray{
background:#202020;
color:white;
border:1px solid var(--line);
}

.final-box{
display:none;
margin-top:24px;
background:var(--card);
border:1px solid var(--line);
padding:24px;
border-radius:24px;
}

.final-box h2{
font-size:32px;
margin-bottom:18px;
}

.guess-options{
display:grid;
gap:12px;
}

.guess-btn{
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
background:#202020;
color:white;
border:1px solid var(--line);
}

.after-choice{
display:none;
margin-top:18px;
}

.footer{
padding:30px;
font-size:14px;
color:#888;
}

@media(max-width:600px){

.brand{font-size:28px;}
.title-bar{font-size:22px;}
.counter{font-size:22px;}
.btn{font-size:19px;}
}
</style>
</head>

<body>

<div class="header">

<div class="brand">Football Quiz</div>

<div class="nav">
<button onclick="location.href='index.html'">HOME</button>
<button onclick="location.href='categories.html'">CATEGORIES</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>

</div>

<div class="title-wrap">
<div class="title-bar" id="quizTitle"></div>
</div>

<div class="container">

<div class="progress-wrap">
<div class="progress" id="progressBar"></div>
</div>

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons" id="gameButtons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="location.href='index.html'">BACK HOME</button>
</div>

<div class="final-box" id="finalBox">

<h2>How many did you guess?</h2>

<div class="guess-options">
<button class="guess-btn" onclick="finishChoice()">0 - 5</button>
<button class="guess-btn" onclick="finishChoice()">6 - 10</button>
<button class="guess-btn" onclick="finishChoice()">11 - 14</button>
<button class="guess-btn" onclick="finishChoice()">I GOT ALL 15 🔥</button>
</div>

<div class="after-choice" id="afterChoice">

<div class="buttons">
<button class="btn green" onclick="location.reload()">PLAY AGAIN</button>
<button class="btn gray" onclick="location.href='index.html'">HOME</button>
</div>

</div>

</div>

</div>

<div class="footer">© Football Quiz</div>

<script>
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "transfers";

const data = {
transfers:{
title:"GUESS THE PLAYER BY THEIR TRANSFERS",
folder:"images/transfers"
},
"player-clues":{
title:"GUESS THE PLAYER BY CLUB + NATIONALITY + NUMBER + POSITION",
folder:"images/player-clues"
},
"nationality-club":{
title:"GUESS THE CLUB BY PLAYERS NATIONALITY",
folder:"images/nationality-club"
}
};

const quiz = data[mode];

document.getElementById("quizTitle").innerText = quiz.title;

let current = 1;
let showingAnswer = false;

function getLevel(){
if(current <= 5) return "easy";
if(current <= 10) return "medium";
return "hard";
}

function getNumber(){
if(current <= 5) return 1;
if(current <= 10) return 1;
return 1;
}

function updateBadge(){
const badge = document.getElementById("difficulty");
badge.className = "badge";

if(current <= 5){
badge.innerText="EASY";
badge.classList.add("easy");
}else if(current <= 10){
badge.innerText="MEDIUM";
badge.classList.add("medium");
}else{
badge.innerText="HARD";
badge.classList.add("hard");
}
}

function updateProgress(){
document.getElementById("progressBar").style.width =
(current/15*100)+"%";
}

function loadQuestion(){
const level = getLevel();
const num = getNumber();

document.getElementById("quizImage").src =
quiz.folder + "/" + level + "/career" + num + ".png";
}

function loadAnswer(){
const level = getLevel();
const num = getNumber();

document.getElementById("quizImage").src =
quiz.folder + "/" + level + "/player" + num + ".png";
}

function mainAction(){

const btn = document.getElementById("mainBtn");

if(!showingAnswer){

loadAnswer();
btn.innerText = current === 15 ? "FINISH" : "NEXT";
showingAnswer = true;

}else{

if(current === 15){
endQuiz();
return;
}

current++;
showingAnswer = false;

loadQuestion();
updateBadge();
updateProgress();

document.getElementById("counter").innerText =
"QUESTION " + current + " / 15";

btn.innerText = "ANSWER";
}
}

function endQuiz(){
document.getElementById("difficulty").style.display="none";
document.querySelector(".viewer").style.display="none";
document.getElementById("counter").style.display="none";
document.getElementById("gameButtons").style.display="none";
document.getElementById("finalBox").style.display="block";
}

function finishChoice(){
document.getElementById("afterChoice").style.display="block";
}

updateBadge();
updateProgress();
loadQuestion();
</script>

</body>
</html>
