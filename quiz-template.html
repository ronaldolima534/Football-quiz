<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--greenDark:#0f5f2d;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:#fff;
text-align:center;
padding-top:170px;
}

/* HEADER */
.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.95);
backdrop-filter:blur(10px);
}

.header{
padding:18px;
border-bottom:1px solid var(--line);
}

.brand{
font-size:32px;
font-weight:900;
margin-bottom:12px;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
}

.nav button{
padding:10px 14px;
font-weight:900;
border:none;
border-radius:12px;
background:#1d1d1d;
color:#fff;
border:1px solid var(--line);
cursor:pointer;
}

/* TITLE */
.title-bar{
margin:20px auto;
width:94%;
max-width:760px;
background:#151515;
padding:20px;
border-radius:20px;
font-size:26px;
font-weight:900;
}

/* CONTAINER */
.container{
width:94%;
max-width:760px;
margin:auto;
}

/* VIEWER */
.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:24px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:0;
transition:opacity .3s ease;
}

.viewer img.show{
opacity:1;
}

/* BOTONES */
.buttons{
margin-top:20px;
display:grid;
gap:12px;
}

.btn{
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
}

.green{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
box-shadow:0 6px 0 var(--greenDark);
}

.green:active{
transform:translateY(4px);
box-shadow:0 2px 0 var(--greenDark);
}

.gray{
background:#222;
color:white;
border:1px solid var(--line);
}

.counter{
margin-top:15px;
font-size:22px;
font-weight:900;
}

</style>
</head>

<body>

<div class="top-ui">
  <div class="header">
    <div class="brand">Football Quiz</div>
    <div class="nav">
      <button onclick="location.href='index.html'">Home</button>
      <button onclick="location.href='daily-quiz.html'">Daily Quiz</button>
    </div>
  </div>
</div>

<div class="title-bar" id="quizTitle">Quiz</div>

<div class="container">

  <div class="viewer">
    <img id="quizImage">
  </div>

  <div class="counter" id="counter"></div>

  <div class="buttons">
    <button class="btn green" onclick="mainAction()" id="mainBtn">ANSWER</button>
    <button class="btn gray" onclick="location.href='index.html'">BACK</button>
  </div>

</div>

<script src="quiz-data.js"></script>

<script>

/* CONFIG */
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "transfers";
const quiz = quizData[mode];

let current = 1;
let showing = false;

/* GENERAR RANDOM */
function random(n){
  return Math.floor(Math.random()*n)+1;
}

/* IMAGENES */
function getQuestion(){
  return `${quiz.folder}/easy/q${random(20)}.webp`;
}

function getAnswer(){
  return `${quiz.folder}/easy/a${random(20)}.webp`;
}

/* 🔥 FIX PARPADEO */
function swapImage(src){
  const img = document.getElementById("quizImage");

  img.classList.remove("show");

  const temp = new Image();

  temp.onload = function(){
    img.src = src;

    setTimeout(()=>{
      img.classList.add("show");
    },50);
  };

  temp.src = src;
}

/* LOAD */
function loadQuestion(){
  swapImage(getQuestion());
}

function loadAnswer(){
  swapImage(getAnswer());
}

/* BOTON */
function mainAction(){
  if(!showing){
    loadAnswer();
    showing = true;
    document.getElementById("mainBtn").innerText = "NEXT";
  }else{
    current++;
    showing = false;
    document.getElementById("mainBtn").innerText = "ANSWER";
    loadQuestion();
  }

  document.getElementById("counter").innerText = current + " / 15";
}

/* INIT */
loadQuestion();

</script>

</body>
</html>
