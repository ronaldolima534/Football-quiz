<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#0b0b0b;
--card:#151515;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:#fff;
text-align:center;
padding-top:170px;
}

.lang-top{
position:fixed;
top:0;
left:0;
width:100%;
z-index:100;
padding:12px 14px 0;
background:rgba(10,10,10,.92);
backdrop-filter:blur(10px);
transition:transform .35s ease;
}

.lang-top.hide{
transform:translateY(-100%);
}

.lang-wrap{
width:94%;
max-width:760px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
gap:10px;
flex-wrap:wrap;
padding-bottom:10px;
}

.lang-label{
font-size:12px;
font-weight:900;
color:#cfcfcf;
letter-spacing:.6px;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:20px;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

.header{
position:fixed;
top:64px;
left:0;
width:100%;
z-index:99;
padding:18px 12px;
background:rgba(10,10,10,.92);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
transition:transform .35s ease;
}

.header.hide{
transform:translateY(-100%);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 14px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#1d1d1d;
color:#fff;
border:1px solid var(--line);
}

.title-wrap{padding:24px 14px 14px;}

.title-bar{
width:94%;
max-width:760px;
margin:auto;
background:#151515;
border:1px solid var(--line);
padding:22px;
border-radius:24px;
font-size:28px;
font-weight:900;
box-shadow:0 14px 30px rgba(0,0,0,.35);
}

.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

.progress-wrap{
height:14px;
background:#1a1a1a;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
border:1px solid var(--line);
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green2),var(--green));
transition:.55s ease;
}

.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}

.easy{background:#15803d;}
.medium{background:#d97706;}
.hard{background:#dc2626;}

.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 16px 34px rgba(0,0,0,.35);
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:1;
transition:opacity .3s ease, transform .3s ease;
}

.fade{
opacity:0;
transform:scale(.95);
}

.counter{
margin-top:18px;
font-size:28px;
font-weight:900;
}

.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:18px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
transition:.25s;
}

.green{
background:linear-gradient(145deg,var(--green),var(--green2));
color:#000;
}

.gray{
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.final-box{
display:none;
margin-top:24px;
background:#151515;
border:1px solid var(--line);
padding:24px;
border-radius:24px;
}

.final-box h2{
font-size:32px;
margin-bottom:18px;
}

.guess-options{
display:grid;
gap:12px;
}

.guess-btn{
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.after-choice{
display:none;
margin-top:18px;
}

.footer{
padding:28px;
font-size:14px;
color:#888;
}

@media(max-width:600px){
body{padding-top:190px;}
.brand{font-size:28px;}
.title-bar{font-size:22px;}
.counter{font-size:22px;}
.btn{font-size:19px;padding:16px;}
.lang-wrap{justify-content:center;}
.header{top:78px;}
}
</style>
</head>

<body>

<div class="lang-top" id="langTop">
  <div class="lang-wrap">
    <div class="lang-label" id="langLabel"></div>
    <div class="lang-buttons" id="languageSelector"></div>
  </div>
</div>

<div class="header" id="mainHeader">
<div class="brand" id="siteName"></div>

<div class="nav">
<button onclick="location.href='index.html'" id="navHome"></button>
<button onclick="location.href='categories.html'" id="navCategories"></button>
<button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
<button onclick="location.href='about.html'" id="navAbout"></button>
<button onclick="location.href='contact.html'" id="navContact"></button>
</div>
</div>

<div class="title-wrap">
<div class="title-bar" id="quizTitle"></div>
</div>

<div class="container">

<div class="progress-wrap">
<div class="progress" id="progressBar"></div>
</div>

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons" id="gameButtons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="location.href='index.html'" id="backHomeBtn"></button>
</div>

<div class="final-box" id="finalBox">
<h2 id="finalTitle"></h2>

<div class="guess-options">
<button class="guess-btn" onclick="finishChoice()" id="finalOption1"></button>
<button class="guess-btn" onclick="finishChoice()" id="finalOption2"></button>
<button class="guess-btn" onclick="finishChoice()" id="finalOption3"></button>
<button class="guess-btn" onclick="finishChoice()" id="finalOption4"></button>
</div>

<div class="after-choice" id="afterChoice">
<div class="buttons">
<button class="btn green" onclick="location.reload()" id="playAgainBtn"></button>
<button class="btn gray" onclick="location.href='index.html'" id="homeBtn"></button>
</div>
</div>
</div>

</div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "transfers";
const quiz = quizData[mode];

if (!quiz) {
  alert("Quiz not found");
  location.href = "index.html";
}

let current = 1;
let showing = false;
let selectedQuestions = [];

function applyQuizTranslations(){
  document.documentElement.lang = getSavedLanguage();
  document.getElementById("langLabel").innerText = t("language_label");
  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navCategories").innerText = t("nav_categories");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");
  document.getElementById("quizTitle").innerText = t(quiz.titleKey);
  document.getElementById("backHomeBtn").innerText = t("back_home");
  document.getElementById("finalTitle").innerText = t("final_title");
  document.getElementById("finalOption1").innerText = t("final_option_1");
  document.getElementById("finalOption2").innerText = t("final_option_2");
  document.getElementById("finalOption3").innerText = t("final_option_3");
  document.getElementById("finalOption4").innerText = t("final_option_4");
  document.getElementById("playAgainBtn").innerText = t("play_again");
  document.getElementById("homeBtn").innerText = t("home");
}

function shuffleArray(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRandomNumbers(total, count){
  const numbers = [];
  for(let i = 1; i <= total; i++){
    numbers.push(i);
  }
  return shuffleArray(numbers).slice(0, count);
}

function buildQuestionSet(){
  const easySet = pickRandomNumbers(quiz.totalEasy, 5).map(num => ({ level: "easy", number: num }));
  const mediumSet = pickRandomNumbers(quiz.totalMedium, 5).map(num => ({ level: "medium", number: num }));
  const hardSet = pickRandomNumbers(quiz.totalHard, 5).map(num => ({ level: "hard", number: num }));
  selectedQuestions = [...easySet, ...mediumSet, ...hardSet];
}

function getCurrentQuestion(){
  return selectedQuestions[current - 1];
}

function getLevel(){
  return getCurrentQuestion().level;
}

function getNumber(){
  return getCurrentQuestion().number;
}

function updateBadge(){
  const badge = document.getElementById("difficulty");
  const level = getLevel();
  badge.className = "badge";

  if(level === "easy"){
    badge.innerText = t("easy");
    badge.classList.add("easy");
  }else if(level === "medium"){
    badge.innerText = t("medium");
    badge.classList.add("medium");
  }else{
    badge.innerText = t("hard");
    badge.classList.add("hard");
  }
}

function updateProgress(){
  document.getElementById("progressBar").style.width = (current / 15 * 100) + "%";
}

function updateCounter(){
  document.getElementById("counter").innerText = `${t("question_label")} ${current} / 15`;
}

function updateMainButton(){
  const btn = document.getElementById("mainBtn");
  if(!showing){
    btn.innerText = t("answer");
  }else{
    btn.innerText = current === 15 ? t("finish") : t("next");
  }
}

function preloadImage(src){
  const img = new Image();
  img.src = src;
}

function preloadCurrentPair(){
  const level = getLevel();
  const number = getNumber();
  preloadImage(`${quiz.folder}/${level}/${quiz.questionPrefix}${number}.png`);
  preloadImage(`${quiz.folder}/${level}/${quiz.answerPrefix}${number}.png`);
}

function preloadNextQuestion(){
  if(current >= 15) return;
  const nextQuestion = selectedQuestions[current];
  if(!nextQuestion) return;

  preloadImage(`${quiz.folder}/${nextQuestion.level}/${quiz.questionPrefix}${nextQuestion.number}.png`);
  preloadImage(`${quiz.folder}/${nextQuestion.level}/${quiz.answerPrefix}${nextQuestion.number}.png`);
}

function swapImage(src){
  const img = document.getElementById("quizImage");
  const preload = new Image();

  preload.onload = function(){
    img.classList.add("fade");
    setTimeout(() => {
      img.src = src;
      img.classList.remove("fade");
    }, 150);
  };

  preload.src = src;
}

function loadQuestion(){
  swapImage(`${quiz.folder}/${getLevel()}/${quiz.questionPrefix}${getNumber()}.png`);
}

function loadAnswer(){
  swapImage(`${quiz.folder}/${getLevel()}/${quiz.answerPrefix}${getNumber()}.png`);
}

function mainAction(){
  const btn = document.getElementById("mainBtn");

  if(!showing){
    loadAnswer();
    showing = true;
    updateMainButton();
    preloadNextQuestion();
  }else{
    if(current === 15){
      endQuiz();
      return;
    }

    current++;
    showing = false;

    updateBadge();
    updateProgress();
    updateCounter();
    updateMainButton();
    loadQuestion();
    preloadCurrentPair();
    preloadNextQuestion();
  }
}

function endQuiz(){
  document.getElementById("difficulty").style.display = "none";
  document.querySelector(".viewer").style.display = "none";
  document.getElementById("counter").style.display = "none";
  document.getElementById("gameButtons").style.display = "none";
  document.getElementById("finalBox").style.display = "block";
}

function finishChoice(){
  document.getElementById("afterChoice").style.display = "block";
}

buildLanguageSelector("languageSelector");
buildQuestionSet();
applyQuizTranslations();
updateBadge();
updateProgress();
updateCounter();
updateMainButton();
preloadCurrentPair();
preloadNextQuestion();
loadQuestion();

let lastScroll = 0;
const header = document.getElementById("mainHeader");
const langTop = document.getElementById("langTop");

window.addEventListener("scroll", () => {
  let currentScroll = window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 80){
    header.classList.add("hide");
    langTop.classList.add("hide");
  }

  if(currentScroll < 20){
    header.classList.remove("hide");
    langTop.classList.remove("hide");
  }

  lastScroll = currentScroll;
});
</script>

</body>
</html>
