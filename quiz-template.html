<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--card:#151515;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--top-ui-height:158px;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:#fff;
text-align:center;
padding-top:var(--top-ui-height);
}

/* TODO EL BLOQUE SUPERIOR */
.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.95);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
transform:translateY(0);
opacity:1;
transition:transform .35s ease, opacity .25s ease;
will-change:transform;
}

.top-ui.hide{
transform:translateY(calc(-1 * var(--top-ui-height)));
opacity:.98;
}

/* IDIOMAS */
.lang-top{
padding:12px 14px 10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:760px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
}

.lang-btn img{
width:28px;
height:20px;
display:block;
border-radius:3px;
object-fit:cover;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

/* HEADER */
.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 14px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#1d1d1d;
color:#fff;
border:1px solid var(--line);
}

/* TITULO */
.title-wrap{
padding:24px 14px 14px;
}

.title-bar{
width:94%;
max-width:760px;
margin:auto;
background:#151515;
border:1px solid var(--line);
padding:22px;
border-radius:24px;
font-size:28px;
font-weight:900;
box-shadow:0 14px 30px rgba(0,0,0,.35);
}

/* MAIN */
.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

.progress-wrap{
height:14px;
background:#1a1a1a;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
border:1px solid var(--line);
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green2),var(--green));
transition:.55s ease;
}

.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}

.easy{background:#15803d;}
.medium{background:#d97706;}
.hard{background:#dc2626;}

.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 16px 34px rgba(0,0,0,.35);
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:1;
transition:opacity .3s ease, transform .3s ease;
}

.fade{
opacity:0;
transform:scale(.95);
}

.counter{
margin-top:18px;
font-size:28px;
font-weight:900;
}

.buttons{
display:grid;
gap:14px;
margin-top:18px;
}

.btn{
padding:18px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
transition:.25s;
}

.green{
background:linear-gradient(145deg,var(--green),var(--green2));
color:#000;
}

.gray{
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.final-box{
display:none;
margin-top:24px;
background:#151515;
border:1px solid var(--line);
padding:24px;
border-radius:24px;
}

.final-box h2{
font-size:32px;
margin-bottom:18px;
}

.guess-options{
display:grid;
gap:12px;
}

.guess-btn{
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
background:#202020;
color:#fff;
border:1px solid var(--line);
}

.after-choice{
display:none;
margin-top:18px;
}

.footer{
padding:28px;
font-size:14px;
color:#888;
}

@media(max-width:600px){
:root{
--top-ui-height:178px;
}

body{
padding-top:var(--top-ui-height);
}

.brand{
font-size:28px;
}

.title-bar{
font-size:22px;
}

.counter{
font-size:22px;
}

.btn{
font-size:19px;
padding:16px;
}

.lang-wrap{
justify-content:center;
}

.lang-btn{
width:46px;
height:46px;
}

.lang-btn img{
width:26px;
height:18px;
}
}
</style>
</head>

function shuffleArray(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRandomNumbers(total, count){
  const numbers = [];
  for(let i = 1; i <= total; i++){
    numbers.push(i);
  }
  return shuffleArray(numbers).slice(0, count);
}

function buildQuestionSet(){
  const easySet = pickRandomNumbers(quiz.totalEasy, 5).map(num => ({ level: "easy", number: num }));
  const mediumSet = pickRandomNumbers(quiz.totalMedium, 5).map(num => ({ level: "medium", number: num }));
  const hardSet = pickRandomNumbers(quiz.totalHard, 5).map(num => ({ level: "hard", number: num }));
  selectedQuestions = [...easySet, ...mediumSet, ...hardSet];
}

function getCurrentQuestion(){
  return selectedQuestions[current - 1];
}

function getLevel(){
  return getCurrentQuestion().level;
}

function getNumber(){
  return getCurrentQuestion().number;
}
