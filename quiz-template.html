<script>
/* 🔥 IMPORTANTE:
NO tocamos tu lógica del juego
solo agregamos SEO dinámico
*/

const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "transfers";

/* SEO DINÁMICO SEGÚN QUIZ */
function updateSEO(){
  let title = "Football Quiz Game";
  let desc = "Play a football quiz game online";

  if(mode === "transfers"){
    title = "Guess the Player by Transfers – Football Quiz";
    desc = "Can you guess the football player from their transfer history? Play now.";
  }

  if(mode === "player-clues"){
    title = "Guess the Player by Clues – Football Quiz";
    desc = "Guess the football player from nationality, club, number and position.";
  }

  if(mode === "nationality-club"){
    title = "Guess the Club by Players Nationality – Football Quiz";
    desc = "Can you guess the football club based on players nationality?";
  }

  document.title = title;

  document.querySelector("meta[name='description']").setAttribute("content", desc);
}

/* Ejecutar */
updateSEO();
</script>
