<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Player By Transfers</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
color:white;
text-align:center;
}

/* top area */
.topbar{
background:rgba(0,0,0,0.55);
padding:24px 12px;
backdrop-filter:blur(4px);
}

.title{
font-size:40px;
font-weight:900;
line-height:1.1;
}

/* ad space top */
.adspace{
width:92%;
max-width:520px;
height:90px;
margin:18px auto 0;
background:rgba(0,0,0,0.35);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:700;
color:white;
}

/* content */
.container{
width:94%;
max-width:540px;
margin:auto;
padding:24px 0 50px;
}

/* difficulty badge */
.badge{
display:inline-block;
padding:10px 18px;
border-radius:999px;
font-size:22px;
font-weight:900;
margin-bottom:18px;
background:#39ff14;
color:black;
}

/* video style */
.viewer{
background:rgba(10,10,25,0.78);
border-radius:26px;
padding:16px;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 14px 28px rgba(0,0,0,0.45);
border:1px solid rgba(255,255,255,0.08);
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* info */
.counter{
margin-top:18px;
font-size:26px;
font-weight:900;
}

.buttons{
margin-top:22px;
display:grid;
gap:16px;
}

.btn{
width:100%;
border:none;
border-radius:20px;
padding:20px;
font-size:34px;
font-weight:900;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
}

.green:active{
transform:translateY(4px);
box-shadow:0 2px #1f9d09;
}

.gray{
background:#1f1f1f;
color:white;
box-shadow:0 8px #111;
}

.gray:active{
transform:translateY(4px);
box-shadow:0 2px #111;
}

/* ad bottom */
.adbottom{
width:100%;
height:120px;
margin-top:24px;
background:rgba(0,0,0,0.35);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">
<div class="title">GUESS THE PLAYER BY HIS TRANSFERS</div>
</div>

<div class="adspace">TOP AD SPACE</div>

<div class="container">

<div class="badge" id="difficulty">EASY</div>

<div class="viewer">
<img id="quizImage" src="career1.png" alt="quiz">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="goHome()">BACK HOME</button>
</div>

<div class="adbottom">BOTTOM AD SPACE</div>

</div>

<script>
let current = 1;
let total = 15;
let showingAnswer = false;

function updateDifficulty(){
let text = 'EASY';

if(current >= 6 && current <= 10){
text = 'MEDIUM';
}

if(current >= 11){
text = 'HARD';
}

document.getElementById('difficulty').innerText = text;
}

function mainAction(){

if(showingAnswer === false){

document.getElementById('quizImage').src = 'player' + current + '.png';
document.getElementById('mainBtn').innerText = 'NEXT';
showingAnswer = true;

}else{

current++;

if(current > total){
goHome();
return;
}

document.getElementById('quizImage').src = 'career' + current + '.png';
document.getElementById('mainBtn').innerText = 'ANSWER';
document.getElementById('counter').innerText = 'QUESTION ' + current + ' / ' + total;

updateDifficulty();

showingAnswer = false;
}

}

function goHome(){
window.location.href='index.html';
}

updateDifficulty();
</script>

</body>
</html>
