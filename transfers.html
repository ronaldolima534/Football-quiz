<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfers Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
text-align:center;
color:white;
}

.topbar{
background:rgba(0,0,0,.55);
padding:24px 10px;
}

.title{
font-size:42px;
font-weight:900;
}

.adbox{
width:94%;
max-width:620px;
height:100px;
margin:18px auto;
background:rgba(0,0,0,.35);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.container{
width:94%;
max-width:620px;
margin:auto;
padding-bottom:50px;
}

.badge{
display:inline-block;
padding:12px 24px;
border-radius:999px;
font-size:28px;
font-weight:900;
margin-bottom:18px;
color:white;
}

.easy{background:#22c55e;}
.medium{background:#f59e0b;}
.hard{background:#ef4444;}

.viewer{
background:rgba(10,10,25,.78);
border-radius:28px;
padding:16px;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.counter{
margin-top:18px;
font-size:30px;
font-weight:900;
}

.buttons{
margin-top:20px;
display:grid;
gap:16px;
}

.btn{
width:100%;
padding:22px;
font-size:34px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
}

.gray{
background:#222;
color:white;
box-shadow:0 8px #111;
}

.green:active,.gray:active{
transform:translateY(4px);
box-shadow:0 2px #111;
}

.suggest-title{
margin-top:24px;
font-size:28px;
font-weight:900;
}

.suggest{
margin-top:16px;
display:grid;
gap:18px;
}

.card{
background:rgba(15,20,45,.88);
padding:18px;
border-radius:24px;
}

.thumb{
height:180px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:rgba(255,255,255,.08);
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.s-title{
font-size:22px;
font-weight:900;
line-height:1.15;
}
</style>
</head>

<body>

<div class="topbar">
<div class="title">GUESS THE PLAYER BY THEIR TRANSFERS</div>
</div>

<div class="adbox">TOP AD SPACE</div>

<div class="container">

<div id="difficulty" class="badge easy">EASY</div>

<div class="viewer">
<img id="quizImage" src="career1.png">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons">
<button id="mainBtn" class="btn green" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="goHome()">BACK HOME</button>
</div>

<div class="adbox">MID AD SPACE</div>

<div class="suggest-title">SIMILAR QUIZZES</div>

<div class="suggest">

<div class="card">
<div class="thumb"><img src="quiz2.jpg"></div>
<div class="s-title">GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION</div>
</div>

<div class="card">
<div class="thumb"><img src="quiz3.jpg"></div>
<div class="s-title">GUESS THE CLUB BY PLAYERS NATIONALITY</div>
</div>

</div>

<div class="adbox">BOTTOM AD SPACE</div>

</div>

<script>
let current=1,total=15,showing=false;

function fakeAd(next){
alert('ADVERTISEMENT');
next();
}

function updateDifficulty(){
let b=document.getElementById('difficulty');
b.className='badge';

if(current<=5){b.innerText='EASY';b.classList.add('easy');}
else if(current<=10){b.innerText='MEDIUM';b.classList.add('medium');}
else{b.innerText='HARD';b.classList.add('hard');}
}

function mainAction(){

if(!showing){

document.getElementById('quizImage').src='player'+current+'.png';

if(current===total){
document.getElementById('mainBtn').innerText='PLAY AGAIN';
}else{
document.getElementById('mainBtn').innerText='NEXT';
}

showing=true;

}else{

if(current===total){
fakeAd(function(){location.reload();});
return;
}

current++;
document.getElementById('quizImage').src='career'+current+'.png';
document.getElementById('mainBtn').innerText='ANSWER';
document.getElementById('counter').innerText='QUESTION '+current+' / '+total;
showing=false;
updateDifficulty();

}
}

function goHome(){
fakeAd(function(){window.location.href='index.html';});
}

updateDifficulty();
</script>

</body>
</html>
