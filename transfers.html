<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transfers Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.png') center/cover fixed;
text-align:center;
color:white;
}

.topbar{
background:rgba(39,24,126,.82);
padding:16px;
backdrop-filter:blur(6px);
}

.logo{
width:300px;
max-width:92%;
display:block;
margin:auto auto 12px;
}

.title{
font-size:30px;
font-weight:900;
line-height:1.1;
}

.container{
width:94%;
max-width:650px;
margin:auto;
padding:18px 0 60px;
}

.badge{
display:inline-block;
background:#22c55e;
padding:12px 26px;
border-radius:999px;
font-size:26px;
font-weight:900;
margin-bottom:16px;
}

.viewer{
background:#27187e;
padding:18px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 12px 24px rgba(0,0,0,.25);
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.counter{
margin-top:16px;
font-size:28px;
font-weight:900;
}

.buttons{
display:grid;
gap:16px;
margin-top:20px;
}

.btn{
padding:22px;
font-size:34px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
}

.gray{
background:#27187e;
color:white;
box-shadow:0 8px #1d115b;
}

.suggest-title{
margin-top:34px;
font-size:28px;
font-weight:900;
}

.card{
background:#27187e;
padding:20px;
border-radius:28px;
margin-top:18px;
}

.thumb{
height:260px;
border-radius:20px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.s-title{
font-size:24px;
font-weight:900;
margin-bottom:14px;
line-height:1.15;
}
</style>
</head>

<body>

<div class="topbar">
<img src="LOGO.png" class="logo">
<div class="title">GUESS THE PLAYER BY THEIR TRANSFERS</div>
</div>

<div class="container">

<div class="badge">EASY</div>

<div class="viewer">
<img id="quizImage" src="images/transfers/easy/career1.png">
</div>

<div class="counter" id="counter">QUESTION 1 / 15</div>

<div class="buttons">
<button class="btn green" id="mainBtn" onclick="nextStep()">ANSWER</button>
<button class="btn gray" onclick="window.location.href='index.html'">BACK HOME</button>
</div>

<div class="suggest-title">SIMILAR QUIZZES</div>

<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz2.jpg">
</div>
<div class="s-title">
GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION
</div>
<button class="btn green" onclick="window.location.href='player-clues.html'">
PLAY
</button>
</div>

<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz3.jpg">
</div>
<div class="s-title">
GUESS THE CLUB BY PLAYERS NATIONALITY
</div>
<button class="btn green" onclick="window.location.href='nationality-club.html'">
PLAY
</button>
</div>

</div>

<script>
let showingAnswer=false;

function nextStep(){

const img=document.getElementById("quizImage");
const btn=document.getElementById("mainBtn");

if(!showingAnswer){

img.src="images/transfers/easy/player1.png";
btn.innerText="NEXT";
showingAnswer=true;

}else{

img.src="images/transfers/easy/career1.png";
btn.innerText="ANSWER";
showingAnswer=false;

}

}
</script>

</body>
</html>
