<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Player By Transfers</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
color:white;
text-align:center;
}

/* top bar */
.topbar{
background:rgba(0,0,0,0.55);
padding:22px 10px;
backdrop-filter:blur(4px);
}

.title{
font-size:34px;
font-weight:900;
line-height:1.1;
}

/* container */
.container{
width:92%;
max-width:480px;
margin:auto;
padding:28px 0 40px;
}

/* youtube style frame */
.viewer{
background:rgba(10,10,25,0.78);
border-radius:24px;
padding:14px;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 14px 28px rgba(0,0,0,0.45);
border:1px solid rgba(255,255,255,0.08);
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* buttons */
.buttons{
margin-top:24px;
display:grid;
gap:14px;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:18px;
font-size:28px;
font-weight:900;
cursor:pointer;
}

.green{
background:#39ff14;
color:black;
box-shadow:0 7px #1f9d09;
}

.green:active{
transform:translateY(4px);
box-shadow:0 2px #1f9d09;
}

.gray{
background:#1f1f1f;
color:white;
box-shadow:0 7px #111;
}

.gray:active{
transform:translateY(4px);
box-shadow:0 2px #111;
}

.counter{
margin-top:16px;
font-size:18px;
font-weight:700;
color:white;
}
</style>
</head>

<body>

<div class="topbar">
<div class="title">GUESS THE PLAYER BY HIS TRANSFERS</div>
</div>

<div class="container">

<div class="viewer">
<img id="quizImage" src="career1.png" alt="quiz">
</div>

<div class="counter" id="counter">Player 1 / 5</div>

<div class="buttons">
<button class="btn green" id="mainBtn" onclick="mainAction()">ANSWER</button>
<button class="btn gray" onclick="goHome()">BACK HOME</button>
</div>

</div>

<script>
let current = 1;
let total = 5; // later you can change this
let showingAnswer = false;

function mainAction(){

if(showingAnswer === false){
document.getElementById('quizImage').src = 'player' + current + '.png';
document.getElementById('mainBtn').innerText = 'NEXT';
showingAnswer = true;
}else{
current++;

if(current > total){
goHome();
return;
}

document.getElementById('quizImage').src = 'career' + current + '.png';
document.getElementById('mainBtn').innerText = 'ANSWER';
document.getElementById('counter').innerText = 'Player ' + current + ' / ' + total;
showingAnswer = false;
}

}

function goHome(){
window.location.href='index.html';
}
</script>

</body>
</html>
