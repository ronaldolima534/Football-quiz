<html lang="en">
<head>

{
  "@context": "https://schema.org",
  "@type": "Quiz",

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--red:#dc2626;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
padding-top:158px;
}

.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
transform:translateY(0);
transition:transform .35s ease;
will-change:transform;
}

.lang-top{
padding:12px 14px 10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
font-size:0;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:#1b1b1b;
color:white;
border:1px solid #333;
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

.page-hero{
padding:32px 18px 24px;
}

.page-hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:28px 20px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.page-title{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.page-sub{
font-size:18px;
color:var(--soft);
line-height:1.5;
}

.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

.question-text{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid var(--line);
border-radius:24px;
padding:20px;
margin-bottom:18px;
font-size:24px;
font-weight:900;
line-height:1.35;
box-shadow:0 12px 28px rgba(0,0,0,.35);
}

.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 16px 34px rgba(0,0,0,.35);
margin-bottom:18px;
position:relative;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:none;
}

.placeholder{
position:absolute;
inset:16px;
border:2px dashed #333;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
font-size:20px;
font-weight:900;
padding:20px;
}

.options{
display:grid;
gap:14px;
margin-top:18px;
}

.option-btn{
width:100%;
padding:18px;
font-size:20px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
background:#202020;
color:#fff;
border:1px solid var(--line);
transition:.2s;
}

.option-btn.correct{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border-color:transparent;
}

.option-btn.wrong{
background:linear-gradient(145deg,#ef4444,var(--red));
color:white;
border-color:transparent;
}

.status-box{
margin-top:20px;
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:20px;
border-radius:22px;
display:none;
}

.status-title{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.status-text{
font-size:16px;
line-height:1.6;
color:#d6d6d6;
}

.footer{
padding:30px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
body{padding-top:178px;}
.brand{font-size:30px;}
.page-title{font-size:30px;}
.page-sub{font-size:16px;}
.question-text{font-size:20px;padding:18px;}
.option-btn{font-size:18px;padding:16px;}
.nav{gap:8px;}
.nav button{font-size:13px;padding:9px 12px;}
.lang-wrap{justify-content:center;}
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">
  <div class="lang-top">
    <div class="lang-wrap">
      <div class="lang-buttons" id="languageSelector"></div>
    </div>
  </div>

  <div class="header">
    <div class="brand" id="siteName"></div>

    <div class="nav">
      <button onclick="location.href='index.html'" id="navHome"></button>
      <button class="active" id="navDailyQuiz"></button>
      <button onclick="location.href='about.html'" id="navAbout"></button>
      <button onclick="location.href='contact.html'" id="navContact"></button>
    </div>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-box">
    <div class="page-title" id="dailyTitle"></div>
    <div class="page-sub" id="dailySubtitle"></div>
  </div>
</div>

<div class="container">

  <div class="question-text" id="questionText"></div>

  <div class="viewer">
    <div class="placeholder" id="imagePlaceholder"></div>
    <img id="dailyImage" src="" alt="Daily Quiz Image">
  </div>

  <div class="options" id="optionsContainer"></div>

  <div class="status-box" id="statusBox">
    <div class="status-title" id="statusTitle"></div>
    <div class="status-text" id="statusText"></div>
  </div>

</div>

<div class="footer">© Football Quiz</div>

<script src="translations.js"></script>
<script src="language.js"></script>
<script src="daily-quiz-data.js"></script>

<script>
const dailyText = {
  en:{
    title:"Daily Quiz",
    subtitle:"One question. One chance. Come back tomorrow for a new challenge.",
    placeholder:"Image will appear here when uploaded",
    alreadyTitle:"Today's quiz already played",
    alreadyText:"Come back tomorrow for a new daily question.",
    correctTitle:"Correct!",
    correctText:"Great choice. Come back tomorrow for a new daily question.",
    wrongTitle:"Not this time",
    wrongText:"The correct answer is highlighted in green. Come back tomorrow for a new daily question.",
    loading:"Loading question..."
  },
  es:{
    title:"Quiz Diario",
    subtitle:"Una pregunta. Una oportunidad. Vuelve mañana por un nuevo reto.",
    placeholder:"La imagen aparecerá aquí cuando la subas",
    alreadyTitle:"El quiz de hoy ya fue jugado",
    alreadyText:"Vuelve mañana por una nueva pregunta diaria.",
    correctTitle:"¡Correcto!",
    correctText:"Gran elección. Vuelve mañana por una nueva pregunta diaria.",
    wrongTitle:"Esta vez no",
    wrongText:"La respuesta correcta está marcada en verde. Vuelve mañana por una nueva pregunta diaria.",
    loading:"Cargando pregunta..."
  },
  pt:{
    title:"Quiz Diário",
    subtitle:"Uma pergunta. Uma chance. Volte amanhã para um novo desafio.",
    placeholder:"A imagem aparecerá aqui quando for enviada",
    alreadyTitle:"O quiz de hoje já foi jogado",
    alreadyText:"Volte amanhã para uma nova pergunta diária.",
    correctTitle:"Correto!",
    correctText:"Ótima escolha. Volte amanhã para uma nova pergunta diária.",
    wrongTitle:"Não foi desta vez",
    wrongText:"A resposta correta está destacada em verde. Volte amanhã para uma nova pergunta diária.",
    loading:"Carregando pergunta..."
  },
  fr:{
    title:"Quiz du Jour",
    subtitle:"Une question. Une chance. Revenez demain pour un nouveau défi.",
    placeholder:"L’image apparaîtra ici une fois ajoutée",
    alreadyTitle:"Le quiz du jour a déjà été joué",
    alreadyText:"Revenez demain pour une nouvelle question quotidienne.",
    correctTitle:"Correct !",
    correctText:"Très bon choix. Revenez demain pour une nouvelle question quotidienne.",
    wrongTitle:"Pas cette fois",
    wrongText:"La bonne réponse est indiquée en vert. Revenez demain pour une nouvelle question quotidienne.",
    loading:"Chargement de la question..."
  },
  it:{
    title:"Quiz del Giorno",
    subtitle:"Una domanda. Una possibilità. Torna domani per una nuova sfida.",
    placeholder:"L’immagine apparirà qui quando verrà caricata",
    alreadyTitle:"Il quiz di oggi è già stato giocato",
    alreadyText:"Torna domani per una nuova domanda giornaliera.",
    correctTitle:"Corretto!",
    correctText:"Ottima scelta. Torna domani per una nuova domanda giornaliera.",
    wrongTitle:"Non questa volta",
    wrongText:"La risposta corretta è evidenziata in verde. Torna domani per una nuova domanda giornaliera.",
    loading:"Caricamento domanda..."
  }
};

function currentLang(){
  const lang = getSavedLanguage();
  if(["en","es","pt","fr","it"].includes(lang)) return lang;
  return "en";
}

function dText(key){
  const lang = currentLang();
  return dailyText[lang][key] || dailyText.en[key];
}

function getField(field){
  const lang = currentLang();

  if(typeof field === "string") return field;
  if(Array.isArray(field)) return field;

  if(field && typeof field === "object"){
    return field[lang] || field.en || field.es || "";
  }

  return "";
}

function applyDailyTranslations(){
  document.documentElement.lang = currentLang();

  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");

  document.getElementById("dailyTitle").innerText = dText("title");
  document.getElementById("dailySubtitle").innerText = dText("subtitle");
  document.getElementById("imagePlaceholder").innerText = dText("placeholder");
  document.getElementById("questionText").innerText = dText("loading");
}

function getDailyIndex(){
  if(typeof dailyQuizData === "undefined" || dailyQuizData.length === 0) return 0;

  const anchor = new Date(2026, 0, 1);
  const today = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.floor((todayMidnight - anchor) / 86400000);

  return ((diffDays % dailyQuizData.length) + dailyQuizData.length) % dailyQuizData.length;
}

function getTodayKey(){
  const now = new Date();
  return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
}

function getSavedAnswerKey(){
  return "footballQuizDailyAnswered_" + getTodayKey();
}

function renderImage(src){
  const img = document.getElementById("dailyImage");
  const placeholder = document.getElementById("imagePlaceholder");

  img.style.display = "none";
  placeholder.style.display = "flex";

  img.onload = function(){
    placeholder.style.display = "none";
    img.style.display = "block";
  };

  img.onerror = function(){
    img.style.display = "none";
    placeholder.style.display = "flex";
  };

  img.src = src;
}

function renderDailyQuiz(){
  if(typeof dailyQuizData === "undefined" || dailyQuizData.length === 0){
    document.getElementById("questionText").innerText = "Daily quiz data not found.";
    document.getElementById("optionsContainer").innerHTML = "";
    return;
  }

  const index = getDailyIndex();
  const question = dailyQuizData[index];

  document.getElementById("questionText").innerText = getField(question.question);

  renderImage(question.image);

  const optionList = getField(question.options);

  let html = "";

  optionList.forEach((option, i) => {
    html += `
      <button class="option-btn" id="option-${i}" onclick="selectOption(${i})">
        ${option}
      </button>
    `;
  });

  document.getElementById("optionsContainer").innerHTML = html;

  const answered = localStorage.getItem(getSavedAnswerKey());

  if(answered !== null){
    revealStoredResult(parseInt(answered, 10));
  }
}

function lockOptions(){
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.disabled = true;
  });
}

function showStatus(correct, alreadyPlayed){
  const statusBox = document.getElementById("statusBox");
  const statusTitle = document.getElementById("statusTitle");
  const statusText = document.getElementById("statusText");

  statusBox.style.display = "block";

  if(alreadyPlayed){
    statusTitle.innerText = dText("alreadyTitle");
    statusText.innerText = dText("alreadyText");
    return;
  }

  if(correct){
    statusTitle.innerText = dText("correctTitle");
    statusText.innerText = dText("correctText");
  }else{
    statusTitle.innerText = dText("wrongTitle");
    statusText.innerText = dText("wrongText");
  }
}

function revealStoredResult(selectedIndex){
  const question = dailyQuizData[getDailyIndex()];

  lockOptions();

  const correctBtn = document.getElementById(`option-${question.correct}`);
  if(correctBtn) correctBtn.classList.add("correct");

  if(selectedIndex !== question.correct){
    const wrongBtn = document.getElementById(`option-${selectedIndex}`);
    if(wrongBtn) wrongBtn.classList.add("wrong");
  }

  showStatus(selectedIndex === question.correct, true);
}

function selectOption(selectedIndex){
  const answerKey = getSavedAnswerKey();

  if(localStorage.getItem(answerKey) !== null) return;

  localStorage.setItem(answerKey, String(selectedIndex));

  const question = dailyQuizData[getDailyIndex()];

  lockOptions();

  const correctBtn = document.getElementById(`option-${question.correct}`);
  if(correctBtn) correctBtn.classList.add("correct");

  if(selectedIndex !== question.correct){
    const wrongBtn = document.getElementById(`option-${selectedIndex}`);
    if(wrongBtn) wrongBtn.classList.add("wrong");
  }

  showStatus(selectedIndex === question.correct, false);
}

buildLanguageSelector("languageSelector");
applyDailyTranslations();
renderDailyQuiz();

const topUI = document.getElementById("topUI");

function updateTopPadding(){
  document.body.style.paddingTop = (topUI.offsetHeight + 12) + "px";
}

function hideTopUI(){
  topUI.style.transform = `translateY(-${topUI.offsetHeight}px)`;
}

function showTopUI(){
  topUI.style.transform = "translateY(0)";
}

updateTopPadding();
window.addEventListener("load", updateTopPadding);
window.addEventListener("resize", updateTopPadding);

let lastScroll = 0;

window.addEventListener("scroll", () => {
  const currentScroll = window.scrollY || window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 80){
    hideTopUI();
  }else if(currentScroll < 10){
    showTopUI();
  }

  lastScroll = currentScroll <= 0 ? 0 : currentScroll;
}, { passive: true });
</script>

</body>
</html>
