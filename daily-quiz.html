<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quiz - Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--red:#dc2626;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
padding-top:158px;
}

.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
transform:translateY(0);
transition:transform .35s ease;
will-change:transform;
}

.lang-top{
padding:12px 14px 10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
font-size:0;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:var(--white);
border:1px solid #333;
transition:.25s;
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

.page-hero{
padding:32px 18px 24px;
}

.page-hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:28px 20px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.page-title{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.page-sub{
font-size:18px;
color:var(--soft);
line-height:1.5;
}

.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
}

/* PREGUNTA */
.question-text{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid var(--line);
border-radius:24px;
padding:20px;
margin-bottom:18px;
font-size:24px;
font-weight:900;
line-height:1.35;
box-shadow:0 12px 28px rgba(0,0,0,.35);
}

.viewer{
background:#151515;
border:1px solid var(--line);
padding:16px;
border-radius:28px;
aspect-ratio:16/9;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
box-shadow:0 16px 34px rgba(0,0,0,.35);
margin-bottom:18px;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

.options{
display:grid;
gap:14px;
margin-top:18px;
}

.option-btn{
width:100%;
padding:18px;
font-size:20px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
background:#202020;
color:#fff;
border:1px solid var(--line);
transition:.2s;
}

.option-btn.correct{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border-color:transparent;
}

.option-btn.wrong{
background:linear-gradient(145deg,#ef4444,var(--red));
color:white;
border-color:transparent;
}

.option-btn.locked{
cursor:default;
transform:none;
}

.status-box{
margin-top:20px;
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:20px;
border-radius:22px;
display:none;
}

.status-title{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.status-text{
font-size:16px;
line-height:1.6;
color:#d6d6d6;
}

.footer{
padding:30px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
body{padding-top:178px;}
.brand{font-size:30px;}
.page-title{font-size:30px;}
.page-sub{font-size:16px;}
.question-text{font-size:20px;padding:18px;}
.option-btn{font-size:18px;padding:16px;}
.nav{gap:8px;}
.nav button{font-size:13px;padding:9px 12px;}
.lang-wrap{justify-content:center;}
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">
  <div class="lang-top">
    <div class="lang-wrap">
      <div class="lang-buttons" id="languageSelector"></div>
    </div>
  </div>

  <div class="header">
    <div class="brand" id="siteName"></div>

    <div class="nav">
      <button onclick="location.href='index.html'" id="navHome"></button>
      <button class="active" id="navDailyQuiz"></button>
      <button onclick="location.href='about.html'" id="navAbout"></button>
      <button onclick="location.href='contact.html'" id="navContact"></button>
    </div>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-box">
    <div class="page-title" id="pageTitle">Daily Quiz</div>
