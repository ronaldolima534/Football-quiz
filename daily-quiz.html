<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Football Quiz – New Question Every Day</title>

<meta name="description" content="Play the Daily Football Quiz. Answer one football question every day and test your knowledge. Come back daily for a new challenge.">
<meta name="keywords" content="daily football quiz, football trivia daily, soccer quiz daily, football question of the day">
<meta name="robots" content="index, follow">
<meta name="author" content="Football Quiz">

<link rel="canonical" href="https://football-quiz-nu.vercel.app/daily-quiz.html">

<meta property="og:title" content="Daily Football Quiz">
<meta property="og:description" content="One football question every day. Test your knowledge.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://football-quiz-nu.vercel.app/daily-quiz.html">
<meta property="og:image" content="https://football-quiz-nu.vercel.app/images/thumbnails/quiz1.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Daily Football Quiz">
<meta name="twitter:description" content="Play one football question every day.">
<meta name="twitter:image" content="https://football-quiz-nu.vercel.app/images/thumbnails/quiz1.jpg">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Quiz",
  "name": "Daily Football Quiz",
  "url": "https://football-quiz-nu.vercel.app/daily-quiz.html",
  "description": "A daily football quiz with one question per day.",
  "inLanguage": "en"
}
</script>

<style>
body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
padding:120px 20px;
}

.container{
max-width:700px;
margin:auto;
}

.question{
font-size:26px;
font-weight:900;
margin-bottom:20px;
}

.image-box{
width:100%;
aspect-ratio:16/9;
background:#1a1a1a;
border-radius:16px;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.options{
display:grid;
gap:12px;
}

.option{
padding:16px;
background:#1c1c1c;
border-radius:12px;
cursor:pointer;
font-weight:900;
border:1px solid #333;
}

.option:hover{
border-color:#22c55e;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:900;
}

.next{
margin-top:20px;
padding:14px 20px;
background:#22c55e;
color:black;
font-weight:900;
border:none;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="question" id="question"></div>

<div class="image-box">
<img id="quizImage" src="">
</div>

<div class="options" id="options"></div>

<div class="result" id="result"></div>

<button class="next" onclick="loadQuestion()">NEXT</button>

</div>

<script>
const questions = [
{
q:"Which player scored the winning goal in the 2014 World Cup final?",
options:["Thomas Müller","Mario Götze","Miroslav Klose","André Schürrle"],
correct:1,
img:"images/daily/q1.webp"
},
{
q:"Which club beat Barcelona 8-2 in the 2020 Champions League?",
options:["PSG","Bayern Munich","Liverpool","Juventus"],
correct:1,
img:"images/daily/q2.webp"
}
];

let current = 0;

function loadQuestion(){
const q = questions[current];

document.getElementById("question").innerText = q.q;
document.getElementById("quizImage").src = q.img;

const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";

q.options.forEach((opt,i)=>{
const btn = document.createElement("div");
btn.className = "option";
btn.innerText = opt;
btn.onclick = ()=>checkAnswer(i);
optionsDiv.appendChild(btn);
});

document.getElementById("result").innerText = "";
}

function checkAnswer(i){
const q = questions[current];

if(i === q.correct){
document.getElementById("result").innerText = "Correct!";
}else{
document.getElementById("result").innerText = "Wrong!";
}
}

loadQuestion();
</script>

</body>
</html>
