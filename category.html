<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category - Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
padding-top:158px;
}

.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
transform:translateY(0);
transition:transform .35s ease;
will-change:transform;
}

.lang-top{
padding:12px 14px 10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
font-size:0;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:var(--white);
border:1px solid #333;
transition:.25s;
}

.nav button:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.page-hero{
padding:32px 18px 24px;
}

.page-hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:28px 20px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.page-title{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.page-sub{
font-size:18px;
color:var(--soft);
line-height:1.5;
}

.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--green);
}

.thumb{
width:100%;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:14px;
}

.quiz-meta{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:14px;
}

.meta-pill{
background:#202020;
border:1px solid var(--line);
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:900;
color:#d2d2d2;
}

.play{
width:100%;
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 22px rgba(34,197,94,.22);
}

.play:hover{
transform:translateY(-2px) scale(1.01);
}

.empty-state{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:28px 20px;
border-radius:24px;
font-size:18px;
font-weight:900;
color:#d0d0d0;
}

.footer{
padding:30px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
body{padding-top:178px;}
.brand{font-size:30px;}
.page-title{font-size:30px;}
.page-sub{font-size:16px;}
.thumb{height:200px;}
.nav{gap:8px;}
.nav button{font-size:13px;padding:9px 12px;}
.lang-wrap{justify-content:center;}
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">
  <div class="lang-top">
    <div class="lang-wrap">
      <div class="lang-buttons" id="languageSelector"></div>
    </div>
  </div>

  <div class="header">
    <div class="brand" id="siteName"></div>

    <div class="nav">
      <button onclick="location.href='index.html'" id="navHome"></button>
      <button onclick="location.href='categories.html'" id="navCategories"></button>
      <button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
      <button onclick="location.href='about.html'" id="navAbout"></button>
      <button onclick="location.href='contact.html'" id="navContact"></button>
    </div>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-box">
    <div class="page-title" id="pageTitle"></div>
    <div class="page-sub" id="pageSub"></div>
  </div>
</div>

<div class="container" id="categoryQuizList"></div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
const params = new URLSearchParams(location.search);
const currentCategory = params.get("category") || "players";

function getCategoryLabel(category){
  if(category === "players") return t("category_players");
  if(category === "clubs") return t("category_clubs");
  if(category === "transfers") return t("category_transfers");
  if(category === "national-teams") return t("category_national_teams");
  return category;
}

function applyCategoryTranslations(){
  document.documentElement.lang = getSavedLanguage();
  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navCategories").innerText = t("nav_categories");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");
  document.getElementById("pageTitle").innerText = getCategoryLabel(currentCategory);
  document.getElementById("pageSub").innerText = t("category_page_subtitle");
}

function buildCategoryQuizzes(){
  const container = document.getElementById("categoryQuizList");

  const quizzes = Object.entries(quizData).filter(([mode, quiz]) =>
    Array.isArray(quiz.categories) && quiz.categories.includes(currentCategory)
  );

  if(quizzes.length === 0){
    container.innerHTML = `<div class="empty-state">${t("no_quizzes_in_category")}</div>`;
    return;
  }

  let html = "";

  quizzes.forEach(([mode, quiz]) => {
    html += `
      <div class="card">
        <div class="thumb">
          <img src="${quiz.thumbnail}" alt="${t(quiz.titleKey)}">
        </div>

        <div class="quiz-title">
          ${t(quiz.titleKey)}
        </div>

        <div class="quiz-meta">
          <div class="meta-pill">${t("pill_15_questions")}</div>
          <div class="meta-pill">${t("pill_easy_medium_hard")}</div>
          <div class="meta-pill">${getCategoryLabel(currentCategory)}</div>
        </div>

        <button class="play" onclick="location.href='quiz-template.html?mode=${mode}'">
          ${t("play")}
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyCategoryTranslations();
buildCategoryQuizzes();

const topUI = document.getElementById("topUI");

function updateTopPadding(){
  const realHeight = topUI.offsetHeight;
  document.body.style.paddingTop = realHeight + 12 + "px";
}

function hideTopUI(){
  const realHeight = topUI.offsetHeight;
  topUI.style.transform = `translateY(-${realHeight}px)`;
}

function showTopUI(){
  topUI.style.transform = "translateY(0)";
}

updateTopPadding();
window.addEventListener("load", updateTopPadding);
window.addEventListener("resize", updateTopPadding);

let lastScroll = 0;

window.addEventListener("scroll", () => {
  const currentScroll = window.scrollY || window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 80){
    hideTopUI();
  }else if(currentScroll < 10){
    showTopUI();
  }

  lastScroll = currentScroll <= 0 ? 0 : currentScroll;
}, { passive: true });
</script>

</body>
</html>
