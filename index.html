<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#0b0b0b;
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
}

/* HEADER */
.header{
background:rgba(10,10,10,.94);
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
padding:18px 12px;
position:sticky;
top:0;
z-index:20;
backdrop-filter:blur(8px);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:var(--white);
border:1px solid #333;
transition:.25s;
}

.nav button:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

/* HERO */
.hero{
padding:34px 20px 30px;
}

.hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:30px 22px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.hero h1{
font-size:44px;
font-weight:900;
line-height:1.08;
margin-bottom:14px;
}

.hero p{
font-size:18px;
color:var(--soft);
max-width:640px;
margin:auto;
line-height:1.5;
}

.hero-stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
margin-top:20px;
}

.hero-stat{
background:#1d1d1d;
border:1px solid var(--line);
padding:12px 16px;
border-radius:999px;
font-size:14px;
font-weight:900;
color:#d9d9d9;
}

/* SECTION */
.section-title{
width:94%;
max-width:820px;
margin:0 auto 18px;
text-align:left;
font-size:30px;
font-weight:900;
}

/* CONTAINER */
.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--green);
}

.thumb{
width:100%;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:14px;
}

.quiz-meta{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:14px;
}

.meta-pill{
background:#202020;
border:1px solid var(--line);
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:900;
color:#d2d2d2;
}

/* BUTTON */
.play{
width:100%;
padding:16px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 22px rgba(34,197,94,.22);
}

.play:hover{
transform:translateY(-2px) scale(1.01);
}

.empty-state{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:28px 20px;
border-radius:24px;
font-size:18px;
font-weight:900;
color:#d0d0d0;
}

/* FOOTER */
.footer{
padding:30px 15px;
font-size:14px;
color:#999;
}

@media(max-width:600px){

.brand{
font-size:30px;
}

.hero{
padding:28px 16px 24px;
}

.hero-box{
padding:24px 16px;
border-radius:22px;
}

.hero h1{
font-size:32px;
}

.hero p{
font-size:16px;
}

.section-title{
font-size:24px;
}

.quiz-title{
font-size:21px;
}

.play{
font-size:20px;
}

.thumb{
height:200px;
}

.nav{
gap:8px;
}

.nav button{
font-size:13px;
padding:9px 12px;
}
}
</style>
</head>

<body>

<div class="header">

<div class="brand">
Football Quiz
</div>

<div class="nav">
<button class="active" onclick="location.href='index.html'">HOME</button>
<button onclick="location.href='categories.html'">CATEGORIES</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>

</div>

<div class="hero">
  <div class="hero-box">
    <h1>Test Your Football Knowledge</h1>
    <p>Play visual football quizzes, reveal the answer, and challenge yourself across easy, medium and hard levels.</p>

    <div class="hero-stats">
      <div class="hero-stat">15 QUESTIONS PER GAME</div>
      <div class="hero-stat">5 EASY • 5 MEDIUM • 5 HARD</div>
      <div class="hero-stat">RANDOM QUIZ FLOW READY</div>
    </div>
  </div>
</div>

<div class="section-title">Featured Quizzes</div>

<div class="container" id="homeQuizList"></div>

<div class="footer">
© Football Quiz
</div>

<script src="quiz-data.js"></script>

<script>
function buildHomeQuizzes(){
  const container = document.getElementById("homeQuizList");

  const quizzes = Object.entries(quizData)
    .filter(([mode, quiz]) => quiz.showOnHome)
    .sort((a, b) => (a[1].homeOrder || 999) - (b[1].homeOrder || 999));

  if(quizzes.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        NO QUIZZES AVAILABLE YET
      </div>
    `;
    return;
  }

  let html = "";

  quizzes.forEach(([mode, quiz]) => {
    html += `
      <div class="card">
        <div class="thumb">
          <img src="${quiz.thumbnail}" alt="${quiz.title}">
        </div>

        <div class="quiz-title">
          ${quiz.title}
        </div>

        <div class="quiz-meta">
          <div class="meta-pill">15 QUESTIONS</div>
          <div class="meta-pill">EASY • MEDIUM • HARD</div>
          <div class="meta-pill">PLAY NOW</div>
        </div>

        <button class="play"
        onclick="location.href='quiz-template.html?mode=${mode}'">
        PLAY NOW
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

buildHomeQuizzes();
</script>

</body>
</html>
