<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
text-align:center;
color:white;
}

.topbar{
background:rgba(0,0,0,.55);
padding:28px 10px;
}

.logo{
font-size:72px;
font-weight:900;
}

.adtop,.adbottom{
width:94%;
max-width:620px;
height:100px;
margin:18px auto;
background:rgba(0,0,0,.35);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.container{
width:94%;
max-width:620px;
margin:auto;
padding-bottom:50px;
}

.card{
background:rgba(15,20,45,.88);
padding:22px;
border-radius:28px;
margin-bottom:28px;
box-shadow:0 14px 28px rgba(0,0,0,.45);
}

.thumb{
height:260px;
border-radius:20px;
overflow:hidden;
margin-bottom:18px;
background:rgba(255,255,255,.08);
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:30px;
font-weight:900;
line-height:1.15;
margin-bottom:18px;
}

.play{
width:100%;
padding:22px;
font-size:38px;
font-weight:900;
border:none;
border-radius:18px;
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
cursor:pointer;
}

.play:active{
transform:translateY(4px);
box-shadow:0 2px #1f9d09;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">⚽ FOOTBALL QUIZ</div>
</div>

<div class="adtop">TOP AD SPACE</div>

<div class="container">

<div class="card">
<div class="thumb"><img src="quiz1.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY THEIR TRANSFERS</div>
<button class="play" onclick="goQuiz('transfers.html')">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="quiz2.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="quiz3.jpg"></div>
<div class="quiz-title">GUESS THE CLUB BY PLAYERS NATIONALITY</div>
<button class="play">PLAY</button>
</div>

<div class="adbottom">BOTTOM AD SPACE</div>

</div>

<script>
function goQuiz(link){
alert("ADVERTISEMENT");
window.location.href=link;
}
</script>

</body>
</html>
