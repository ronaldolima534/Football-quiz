<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--greenDark:#0f5f2d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(34,197,94,.12), transparent 28%),
linear-gradient(180deg,#070707,#111);
color:var(--white);
text-align:center;
padding-top:158px;
}

/* TOP */
.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(8,8,8,.95);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
transition:transform .35s ease;
border-bottom:1px solid rgba(255,255,255,.06);
}

.lang-top{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:44px;
height:44px;
border-radius:12px;
border:1px solid #333;
background:#1d1d1d;
cursor:pointer;
font-size:0;
overflow:hidden;
transition:.2s;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

.header{
padding:20px 12px 22px;
}

.brand{
font-size:40px;
font-weight:900;
margin-bottom:16px;
letter-spacing:.3px;
text-shadow:0 0 24px rgba(34,197,94,.18);
}

.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav button{
padding:11px 16px;
border-radius:15px;
border:1px solid #333;
background:#1d1d1d;
color:white;
font-size:14px;
font-weight:900;
cursor:pointer;
transition:.2s;
box-shadow:0 5px 0 #111;
}

.nav button:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.nav button:active{
transform:translateY(3px);
box-shadow:0 2px 0 #111;
}

/* HERO */
.hero{
padding:34px 18px 22px;
}

.hero-box{
max-width:820px;
margin:auto;
background:
linear-gradient(145deg,rgba(20,20,20,.96),rgba(28,28,28,.96));
border:1px solid var(--line);
border-radius:30px;
padding:34px 22px;
box-shadow:
0 18px 40px rgba(0,0,0,.42),
inset 0 1px 0 rgba(255,255,255,.04);
}

.hero h1{
font-size:42px;
font-weight:900;
line-height:1.08;
margin-bottom:12px;
}

.hero p{
font-size:18px;
color:var(--soft);
line-height:1.5;
margin-bottom:22px;
}

/* RANDOM BUTTON */
.random-btn{
width:100%;
max-width:430px;
margin:auto;
padding:21px;
border-radius:22px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-size:24px;
font-weight:900;
color:#000;
cursor:pointer;
box-shadow:
0 10px 0 var(--greenDark),
0 20px 34px rgba(34,197,94,.28);
transition:.15s;
animation:pulseGlow 2.4s infinite;
}

.random-btn:hover{
transform:translateY(-2px);
box-shadow:
0 12px 0 var(--greenDark),
0 24px 38px rgba(34,197,94,.34);
}

.random-btn:active{
transform:translateY(6px);
box-shadow:
0 3px 0 var(--greenDark),
0 10px 18px rgba(34,197,94,.20);
}

@keyframes pulseGlow{
0%,100%{
filter:brightness(1);
}
50%{
filter:brightness(1.08);
}
}

/* SECTION */
.section-title{
width:94%;
max-width:820px;
margin:32px auto 0;
font-size:30px;
font-weight:900;
text-align:left;
}

/* GRID */
.container{
width:94%;
max-width:820px;
margin:20px auto 60px;
display:grid;
gap:24px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1d1d1d);
border:1px solid #2b2b2b;
padding:16px;
border-radius:28px;
box-shadow:
0 14px 32px rgba(0,0,0,.38),
inset 0 1px 0 rgba(255,255,255,.03);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
border-color:rgba(34,197,94,.7);
}

.thumb{
height:230px;
border-radius:20px;
overflow:hidden;
margin-bottom:16px;
background:#222;
box-shadow:0 10px 24px rgba(0,0,0,.35);
}

.thumb img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:18px;
text-transform:uppercase;
}

/* PLAY BUTTON PREMIUM */
.play{
width:100%;
padding:20px;
border-radius:20px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-weight:900;
font-size:26px;
color:#000;
cursor:pointer;
letter-spacing:.5px;
box-shadow:
0 9px 0 var(--greenDark),
0 16px 28px rgba(34,197,94,.28);
transition:.15s;
}

.play:hover{
transform:translateY(-2px);
box-shadow:
0 11px 0 var(--greenDark),
0 20px 34px rgba(34,197,94,.34);
}

.play:active{
transform:translateY(6px);
box-shadow:
0 3px 0 var(--greenDark),
0 8px 16px rgba(34,197,94,.20);
}

/* FOOTER */
.footer{
padding:32px 15px;
color:#999;
font-size:14px;
line-height:1.7;
}

.footer a{
color:#22c55e;
text-decoration:none;
font-weight:900;
}

.footer a:hover{
text-decoration:underline;
}

@media(max-width:600px){
body{
padding-top:178px;
}

.lang-wrap{
justify-content:center;
}

.brand{
font-size:34px;
}

.hero h1{
font-size:32px;
}

hero p{
font-size:16px;
}

.hero-box{
padding:28px 18px;
}

.random-btn{
font-size:21px;
padding:19px;
}

.section-title{
font-size:26px;
}

.thumb{
height:210px;
}

.quiz-title{
font-size:22px;
}

.play{
font-size:24px;
padding:19px;
}

.nav button{
font-size:13px;
padding:10px 13px;
}
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">

  <div class="lang-top">
    <div class="lang-wrap">
      <div class="lang-buttons" id="languageSelector"></div>
    </div>
  </div>

  <div class="header">
    <div class="brand" id="siteName"></div>

    <div class="nav">
      <button onclick="location.href='index.html'" id="navHome"></button>
      <button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
      <button onclick="location.href='about.html'" id="navAbout"></button>
      <button onclick="location.href='contact.html'" id="navContact"></button>
    </div>
  </div>

</div>

<div class="hero">
  <div class="hero-box">
    <h1 id="heroTitle"></h1>
    <p id="heroSub"></p>

    <button class="random-btn" onclick="playRandomQuiz()">
      PLAY RANDOM QUIZ
    </button>
  </div>
</div>

<div class="section-title" id="featuredTitle"></div>

<div class="container" id="quizContainer"></div>

<div class="footer">
  © Football Quiz
  <br><br>
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms of Service</a>
</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function safeT(key, fallback){
  try{
    const value = t(key);
    return value && value !== key ? value : fallback;
  }catch{
    return fallback;
  }
}

function playRandomQuiz(){
  const quizzes = Object.entries(quizData)
    .filter(([mode, quiz]) => quiz.showOnHome);

  if(quizzes.length === 0) return;

  const randomQuiz = quizzes[Math.floor(Math.random() * quizzes.length)];
  location.href = `quiz-template.html?mode=${randomQuiz[0]}`;
}

function applyHomeTranslations(){
  document.documentElement.lang = getSavedLanguage();

  document.getElementById("siteName").innerText = safeT("site_name", "Football Quiz");
  document.getElementById("navHome").innerText = safeT("nav_home", "HOME");
  document.getElementById("navDailyQuiz").innerText = safeT("nav_daily_quiz", "DAILY QUIZ");
  document.getElementById("navAbout").innerText = safeT("nav_about", "ABOUT");
  document.getElementById("navContact").innerText = safeT("nav_contact", "CONTACT");

  document.getElementById("heroTitle").innerText = safeT("hero_title", "Test Your Football Knowledge");
  document.getElementById("heroSub").innerText = safeT("hero_subtitle", "Play visual football quizzes and prove you are a real fan.");
  document.getElementById("featuredTitle").innerText = safeT("featured_quizzes", "Featured Quizzes");
}

function buildHomeQuizzes(){
  const container = document.getElementById("quizContainer");

  const quizzes = Object.entries(quizData)
    .filter(([mode, quiz]) => quiz.showOnHome)
    .sort((a,b) => (a[1].homeOrder || 999) - (b[1].homeOrder || 999));

  let html = "";

  quizzes.forEach(([mode, quiz]) => {
    html += `
      <div class="card">
        <div class="thumb">
          <img src="${quiz.thumbnail}" alt="${safeT(quiz.titleKey, "Football Quiz")}">
        </div>

        <div class="quiz-title">
          ${safeT(quiz.titleKey, quiz.titleKey)}
        </div>

        <button class="play" onclick="location.href='quiz-template.html?mode=${mode}'">
          ${safeT("play", "PLAY")}
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyHomeTranslations();
buildHomeQuizzes();

/* HIDE HEADER ON SCROLL */
const topUI = document.getElementById("topUI");

function updateTopPadding(){
  document.body.style.paddingTop = (topUI.offsetHeight + 12) + "px";
}

function hideTopUI(){
  topUI.style.transform = `translateY(-${topUI.offsetHeight}px)`;
}

function showTopUI(){
  topUI.style.transform = "translateY(0)";
}

updateTopPadding();
window.addEventListener("load", updateTopPadding);
window.addEventListener("resize", updateTopPadding);

let lastScroll = 0;

window.addEventListener("scroll", () => {
  const current = window.scrollY || window.pageYOffset;

  if(current > lastScroll && current > 80){
    hideTopUI();
  }else if(current < 10){
    showTopUI();
  }

  lastScroll = current <= 0 ? 0 : current;
}, { passive:true });
</script>

</body>
</html>
