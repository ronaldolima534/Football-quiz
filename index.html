<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:var(--white);
text-align:center;
padding-top:158px;
}

.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
transition:.35s;
will-change:transform;
}

.lang-top{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
}

.lang-buttons{
display:flex;
gap:8px;
}

.lang-btn{
width:42px;
height:42px;
border-radius:10px;
border:1px solid #333;
background:#1d1d1d;
cursor:pointer;
font-size:0;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav button{
padding:10px 14px;
border-radius:14px;
border:1px solid var(--line);
background:#1d1d1d;
color:white;
font-weight:900;
cursor:pointer;
}

.hero{
padding:36px 18px 26px;
}

.hero-box{
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:30px 20px;
}

.hero h1{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:var(--soft);
margin-bottom:18px;
}

.hero-stats{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.stat{
background:#202020;
border:1px solid var(--line);
padding:10px 14px;
border-radius:999px;
font-size:13px;
font-weight:900;
}

.section-title{
margin-top:30px;
font-size:28px;
font-weight:900;
}

.container{
width:94%;
max-width:820px;
margin:20px auto 60px;
display:grid;
gap:20px;
}

.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:24px;
}

.thumb{
height:210px;
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:22px;
font-weight:900;
margin-bottom:14px;
}

.play{
width:100%;
padding:18px;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-weight:900;
font-size:22px;
cursor:pointer;
box-shadow:
0 8px 0 #0f5f2d,
0 14px 24px rgba(34,197,94,.25);
transition:.15s;
}

.play:hover{
transform:translateY(-2px);
box-shadow:
0 10px 0 #0f5f2d,
0 18px 28px rgba(34,197,94,.30);
}

.play:active{
transform:translateY(4px);
box-shadow:
0 2px 0 #0f5f2d,
0 8px 16px rgba(34,197,94,.2);
}

.footer{
padding:30px;
color:#999;
font-size:14px;
}
</style>
</head>

<body>

<div class="top-ui" id="topUI">
<div class="lang-top">
<div class="lang-wrap">
<div class="lang-buttons" id="languageSelector"></div>
</div>
</div>

<div class="header">
<div class="brand" id="siteName"></div>

<div class="nav">
<button onclick="location.href='index.html'" id="navHome"></button>
<button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
<button onclick="location.href='about.html'" id="navAbout"></button>
<button onclick="location.href='contact.html'" id="navContact"></button>
</div>
</div>
</div>

<div class="hero">
<div class="hero-box">
<h1 id="heroTitle"></h1>
<p id="heroSub"></p>

<div class="hero-stats">
<div class="stat" id="stat1"></div>
<div class="stat" id="stat2"></div>
<div class="stat" id="stat3"></div>
</div>
</div>
</div>

<div class="section-title" id="featuredTitle"></div>

<div class="container" id="quizContainer"></div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function applyHomeTranslations(){
document.getElementById("siteName").innerText = t("site_name");
document.getElementById("navHome").innerText = t("nav_home");
document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
document.getElementById("navAbout").innerText = t("nav_about");
document.getElementById("navContact").innerText = t("nav_contact");
document.getElementById("heroTitle").innerText = t("hero_title");
document.getElementById("heroSub").innerText = t("hero_subtitle");
document.getElementById("stat1").innerText = t("hero_stat_1");
document.getElementById("stat2").innerText = t("hero_stat_2");
document.getElementById("stat3").innerText = t("hero_stat_3");
document.getElementById("featuredTitle").innerText = t("featured_quizzes");
}

function buildHomeQuizzes(){
let html = "";
const quizzes = Object.entries(quizData);

quizzes.forEach(([mode,quiz])=>{
if(!quiz.showOnHome) return;
html += `
<div class="card">
<div class="thumb">
<img src="${quiz.thumbnail}">
</div>
<div class="quiz-title">${t(quiz.titleKey)}</div>
<button class="play" onclick="location.href='quiz-template.html?mode=${mode}'">
${t("play")}
</button>
</div>`;
});

document.getElementById("quizContainer").innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyHomeTranslations();
buildHomeQuizzes();

const topUI = document.getElementById("topUI");

function updateTopPadding(){
document.body.style.paddingTop = topUI.offsetHeight + 12 + "px";
}

function hideTopUI(){
topUI.style.transform = `translateY(-${topUI.offsetHeight}px)`;
}

function showTopUI(){
topUI.style.transform = "translateY(0)";
}

updateTopPadding();
window.addEventListener("load", updateTopPadding);
window.addEventListener("resize", updateTopPadding);

let lastScroll = 0;
window.addEventListener("scroll",()=>{
let current = window.scrollY || window.pageYOffset;
if(current > lastScroll && current > 80){
hideTopUI();
}else if(current < 10){
showTopUI();
}
lastScroll = current <= 0 ? 0 : current;
}, { passive:true });
</script>

</body>
</html>
