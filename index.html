<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.png') center/cover fixed;
text-align:center;
color:white;
}

.top-logo{
padding:16px 10px 10px;
}

.logo{
width:260px;
max-width:86%;
display:block;
margin:auto;
}

.container{
width:94%;
max-width:620px;
margin:auto;
padding:8px 0 50px;
display:grid;
gap:16px;
}

.card{
background:#27187e;
padding:14px;
border-radius:22px;
box-shadow:0 10px 18px rgba(0,0,0,.22);
}

.thumb{
height:205px;
border-radius:16px;
overflow:hidden;
margin-bottom:12px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:22px;
font-weight:900;
line-height:1.15;
margin-bottom:12px;
}

.play{
width:100%;
padding:18px;
font-size:30px;
font-weight:900;
border:none;
border-radius:16px;
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
cursor:pointer;
}
</style>
</head>

<body>

<div class="top-logo">
<img src="LOGO.png" class="logo">
</div>

<div class="container">

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz1.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY THEIR TRANSFERS</div>
<button class="play" onclick="location.href='quiz-template.html?mode=transfers'">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz2.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION</div>
<button class="play" onclick="location.href='quiz-template.html?mode=player-clues'">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz3.jpg"></div>
<div class="quiz-title">GUESS THE CLUB BY PLAYERS NATIONALITY</div>
<button class="play" onclick="location.href='quiz-template.html?mode=nationality-club'">PLAY</button>
</div>

</div>

</body>
</html>
