<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#0b0b0b;
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
}

/* SOLO BANDERAS */
.lang-top{
padding:12px 14px 0;
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
padding:0;
overflow:hidden;
}

.lang-btn img{
width:28px;
height:20px;
display:block;
border-radius:3px;
object-fit:cover;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

/* HEADER */
.header{
background:rgba(10,10,10,.94);
border-bottom:1px solid var(--line);
box-shadow:0 4px 14px rgba(0,0,0,.28);
padding:18px 12px;
position:sticky;
top:0;
z-index:20;
backdrop-filter:blur(8px);
}

.brand{
font-size:38px;
font-weight:900;
margin-bottom:14px;
letter-spacing:.4px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:var(--white);
border:1px solid #333;
transition:.25s;
}

.nav button:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

/* HERO */
.hero{
padding:34px 20px 30px;
}

.hero-box{
width:94%;
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:30px 22px;
box-shadow:0 16px 34px rgba(0,0,0,.34);
}

.hero h1{
font-size:44px;
font-weight:900;
line-height:1.08;
margin-bottom:14px;
}

.hero p{
font-size:18px;
color:var(--soft);
max-width:640px;
margin:auto;
line-height:1.5;
}

.hero-stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
margin-top:20px;
}

.hero-stat{
background:#1d1d1d;
border:1px solid var(--line);
padding:12px 16px;
border-radius:999px;
font-size:14px;
font-weight:900;
color:#d9d9d9;
}

/* SECTION */
.section-title{
width:94%;
max-width:820px;
margin:0 auto 18px;
text-align:left;
font-size:30px;
font-weight:900;
}

/* CONTAINER */
.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--green);
}

.thumb{
width:100%;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:14px;
}

.quiz-meta{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:14px;
}

.meta-pill{
background:#202020;
border:1px solid var(--line);
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:900;
color:#d2d2d2;
}

.play{
width:100%;
padding:16px;
font-size:22px;
font-weight:900;
border:none;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 22px rgba(34,197,94,.22);
}

.play:hover{
transform:translateY(-2px) scale(1.01);
}

.empty-state{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:28px 20px;
border-radius:24px;
font-size:18px;
font-weight:900;
color:#d0d0d0;
}

.footer{
padding:30px 15px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
.brand{font-size:30px;}
.hero{padding:28px 16px 24px;}
.hero-box{padding:24px 16px;border-radius:22px;}
.hero h1{font-size:32px;}
.hero p{font-size:16px;}
.section-title{font-size:24px;}
.quiz-title{font-size:21px;}
.play{font-size:20px;}
.thumb{height:200px;}
.nav{gap:8px;}
.nav button{font-size:13px;padding:9px 12px;}
.lang-wrap{justify-content:center;}
.lang-btn{
width:46px;
height:46px;
}
.lang-btn img{
width:26px;
height:18px;
}
}
</style>
</head>

<body>

<div class="lang-top">
  <div class="lang-wrap">
    <div class="lang-buttons" id="languageSelector"></div>
  </div>
</div>

<div class="header">
<div class="brand" id="siteName"></div>

<div class="nav">
<button class="active" onclick="location.href='index.html'" id="navHome"></button>
<button onclick="location.href='categories.html'" id="navCategories"></button>
<button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
<button onclick="location.href='about.html'" id="navAbout"></button>
<button onclick="location.href='contact.html'" id="navContact"></button>
</div>
</div>

<div class="hero">
  <div class="hero-box">
    <h1 id="heroTitle"></h1>
    <p id="heroSubtitle"></p>

    <div class="hero-stats">
      <div class="hero-stat" id="heroStat1"></div>
      <div class="hero-stat" id="heroStat2"></div>
      <div class="hero-stat" id="heroStat3"></div>
    </div>
  </div>
</div>

<div class="section-title" id="featuredTitle"></div>

<div class="container" id="homeQuizList"></div>

<div class="footer">
© Football Quiz
</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function applyIndexTranslations(){
  document.documentElement.lang = getSavedLanguage();
  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navCategories").innerText = t("nav_categories");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");
  document.getElementById("heroTitle").innerText = t("hero_title");
  document.getElementById("heroSubtitle").innerText = t("hero_subtitle");
  document.getElementById("heroStat1").innerText = t("hero_stat_1");
  document.getElementById("heroStat2").innerText = t("hero_stat_2");
  document.getElementById("heroStat3").innerText = t("hero_stat_3");
  document.getElementById("featuredTitle").innerText = t("featured_quizzes");
}

function buildHomeQuizzes(){
  const container = document.getElementById("homeQuizList");

  const quizzes = Object.entries(quizData)
    .filter(([mode, quiz]) => quiz.showOnHome)
    .sort((a, b) => (a[1].homeOrder || 999) - (b[1].homeOrder || 999));

  if(quizzes.length === 0){
    container.innerHTML = `<div class="empty-state">NO QUIZZES AVAILABLE YET</div>`;
    return;
  }

  let html = "";

  quizzes.forEach(([mode, quiz]) => {
    html += `
      <div class="card">
        <div class="thumb">
          <img src="${quiz.thumbnail}" alt="${t(quiz.titleKey)}">
        </div>

        <div class="quiz-title">
          ${t(quiz.titleKey)}
        </div>

        <div class="quiz-meta">
          <div class="meta-pill">${t("pill_15_questions")}</div>
          <div class="meta-pill">${t("pill_easy_medium_hard")}</div>
          <div class="meta-pill">${t("pill_play_now")}</div>
        </div>

        <button class="play"
        onclick="location.href='quiz-template.html?mode=${mode}'">
        ${t("play_now")}
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyIndexTranslations();
buildHomeQuizzes();
</script>

</body>
</html>
