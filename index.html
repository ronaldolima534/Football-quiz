<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
}

/* Brand */
.brand{
padding:28px 15px 10px;
font-size:38px;
font-weight:900;
letter-spacing:1px;
}

/* Hero */
.hero{
padding:8px 20px 28px;
}

.hero h1{
font-size:42px;
font-weight:900;
line-height:1.1;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cfcfcf;
max-width:620px;
margin:auto;
line-height:1.5;
}

/* Layout */
.container{
width:94%;
max-width:720px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

/* Cards */
.card{
background:#171717;
border:1px solid #2b2b2b;
padding:16px;
border-radius:24px;
box-shadow:0 10px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
border-color:#39ff14;
}

.thumb{
height:220px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:14px;
}

/* Button */
.play{
width:100%;
padding:16px;
font-size:22px;
font-weight:900;
border:none;
border-radius:16px;
background:#39ff14;
color:black;
cursor:pointer;
transition:.2s;
}

.play:hover{
transform:scale(1.02);
}

/* Footer */
.footer{
padding:30px 15px;
font-size:14px;
color:#999;
}

/* Mobile */
@media(max-width:600px){

.brand{
font-size:32px;
}

.hero h1{
font-size:32px;
}

.hero p{
font-size:16px;
}

.quiz-title{
font-size:21px;
}

.play{
font-size:20px;
}
}
</style>
</head>

<body>

<div class="brand">
Football Quiz
</div>

<div class="hero">
<h1>Test Your Football Knowledge</h1>
<p>Play fun football quizzes and prove you're a real fan.</p>
</div>

<div class="container">

<!-- Quiz 1 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz1.jpg">
</div>
<div class="quiz-title">
GUESS THE PLAYER BY THEIR TRANSFERS
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=transfers'">
PLAY NOW
</button>
</div>

<!-- Quiz 2 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz2.jpg">
</div>
<div class="quiz-title">
GUESS THE PLAYER BY NATIONALITY + CLUB + NUMBER + POSITION
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=player-clues'">
PLAY NOW
</button>
</div>

<!-- Quiz 3 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz3.jpg">
</div>
<div class="quiz-title">
GUESS THE CLUB BY PLAYERS NATIONALITY
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=nationality-club'">
PLAY NOW
</button>
</div>

</div>

<div class="footer">
© Football Quiz
</div>

</body>
</html>
