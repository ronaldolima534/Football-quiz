<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#10367d;
color:white;
text-align:center;
}

.logo{
font-size:38px;
font-weight:900;
padding-top:30px;
}

.slogan{
font-size:30px;
font-weight:900;
padding:20px;
}

.container{
width:90%;
max-width:400px;
margin:auto;
}

.card{
background:#1b2f63;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.thumb{
height:140px;
background:rgba(255,255,255,0.15);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.quiz-title{
font-size:24px;
font-weight:900;
margin:15px 0;
}

.play{
background:#ffd400;
color:black;
font-weight:900;
border:none;
padding:14px;
width:100%;
border-radius:14px;
font-size:18px;
box-shadow:0 6px #b89a00;
cursor:pointer;
}

.play:active{
transform:translateY(3px);
box-shadow:0 2px #b89a00;
}
</style>
</head>

<body>

<div class="logo">⚽ Football Quiz</div>

<div class="slogan">
ONLY REAL FANS SCORE 10/10
</div>

<div class="container">

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">Quiz 1</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">Quiz 2</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">Quiz 3</div>
<button class="play">PLAY</button>
</div>

</div>

</body>
</html>
