<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#10367d;
font-family:Arial, sans-serif;
color:white;
text-align:center;
}

.logo{
font-size:56px;
font-weight:900;
padding-top:35px;
}

.slogan{
margin-top:35px;
font-size:36px;
font-weight:900;
line-height:1.2;
padding:0 20px;
}

.section-title{
margin-top:45px;
margin-bottom:25px;
font-size:26px;
font-weight:900;
letter-spacing:1px;
}

.container{
width:92%;
max-width:430px;
margin:auto;
padding-bottom:40px;
}

.card{
background:#1b2f63;
border-radius:24px;
padding:18px;
margin-bottom:28px;
box-shadow:0 12px 24px rgba(0,0,0,0.30);
}

.thumb{
height:190px;
border-radius:18px;
background:rgba(255,255,255,0.15);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

.quiz-title{
font-size:30px;
font-weight:900;
margin:18px 0;
}

.play{
width:100%;
background:#ffd400;
color:black;
border:none;
border-radius:18px;
padding:18px;
font-size:28px;
font-weight:900;
box-shadow:0 7px #b89600;
cursor:pointer;
}

.play:active{
transform:translateY(3px);
box-shadow:0 2px #b89600;
}
</style>
</head>

<body>

<div class="logo">⚽ Football Quiz</div>

<div class="slogan">
DEMUESTRA CUANTO SABES DE FUTBOL
</div>

<div class="section-title">
🔥 QUIZZES DISPONIBLES 🔥
</div>

<div class="container">

<div class="card">
<div class="thumb">IMAGEN QUIZ</div>
<div class="quiz-title">Quiz 1</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">IMAGEN QUIZ</div>
<div class="quiz-title">Quiz 2</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">IMAGEN QUIZ</div>
<div class="quiz-title">Quiz 3</div>
<button class="play">PLAY</button>
</div>

</div>

</body>
</html>
