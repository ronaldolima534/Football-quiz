<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--card:#151515;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:var(--white);
text-align:center;
padding-top:158px;
}

/* TOP */
.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
transition:.35s;
}

.lang-top{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
}

.lang-buttons{
display:flex;
gap:8px;
}

.lang-btn{
width:42px;
height:42px;
border-radius:10px;
border:1px solid #333;
background:#1d1d1d;
cursor:pointer;
font-size:0;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav button{
padding:10px 14px;
border-radius:14px;
border:1px solid var(--line);
background:#1d1d1d;
color:white;
font-weight:900;
cursor:pointer;
}

/* HERO */
.hero{
padding:36px 18px 20px;
}

.hero-box{
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:30px 20px;
}

.hero h1{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:var(--soft);
margin-bottom:20px;
}

/* RANDOM BUTTON */
.random-btn{
width:100%;
max-width:400px;
margin:auto;
padding:20px;
border-radius:20px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-size:24px;
font-weight:900;
cursor:pointer;

box-shadow:
0 10px 0 #0f5f2d,
0 20px 30px rgba(34,197,94,.25);

transition:.15s;
}

/* GRID */
.container{
width:94%;
max-width:820px;
margin:20px auto 60px;
display:grid;
gap:20px;
}

.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:24px;
}

.thumb{
height:210px;
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:22px;
font-weight:900;
margin-bottom:14px;
}

.play{
width:100%;
padding:18px;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-weight:900;
font-size:22px;
cursor:pointer;
}

/* FOOTER */
.footer{
padding:30px;
color:#999;
font-size:14px;
}

.footer a{
color:#22c55e;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<div class="top-ui">
<div class="lang-top">
<div class="lang-wrap">
<div class="lang-buttons" id="languageSelector"></div>
</div>
</div>

<div class="header">
<div class="brand">Football Quiz</div>

<div class="nav">
<button onclick="location.href='index.html'">HOME</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>
</div>
</div>

<div class="hero">
<div class="hero-box">
<h1>Football Quiz</h1>
<p>Test your football knowledge and challenge yourself daily.</p>

<button class="random-btn" onclick="playRandomQuiz()">
PLAY RANDOM QUIZ
</button>

</div>
</div>

<div class="container" id="quizContainer"></div>

<div class="footer">
© Football Quiz <br><br>
<a href="privacy.html">Privacy Policy</a> | 
<a href="terms.html">Terms of Service</a>
</div>

<script src="quiz-data.js"></script>
<script src="language.js"></script>

<script>
function playRandomQuiz(){
const quizzes = Object.keys(quizData);
const random = quizzes[Math.floor(Math.random()*quizzes.length)];
location.href = `quiz-template.html?mode=${random}`;
}

function buildHomeQuizzes(){
let html = "";

Object.entries(quizData).forEach(([mode,quiz])=>{
if(!quiz.showOnHome) return;

html += `
<div class="card">
<div class="thumb">
<img src="${quiz.thumbnail}">
</div>
<div class="quiz-title">${quiz.titleKey}</div>
<button class="play" onclick="location.href='quiz-template.html?mode=${mode}'">
PLAY
</button>
</div>`;
});

document.getElementById("quizContainer").innerHTML = html;
}

buildHomeQuizzes();
</script>

</body>
</html>
