<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
color:white;
text-align:center;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
}

/* top bar */
.topbar{
background:rgba(0,0,0,0.55);
padding:24px 10px;
backdrop-filter:blur(4px);
}

.logo{
font-size:64px;
font-weight:900;
letter-spacing:1px;
}

/* container */
.container{
width:92%;
max-width:460px;
margin:auto;
padding-top:28px;
padding-bottom:40px;
}

/* quiz cards */
.card{
background:rgba(15,20,45,0.88);
border-radius:26px;
padding:18px;
margin-bottom:28px;
box-shadow:0 14px 28px rgba(0,0,0,0.45);
border:1px solid rgba(255,255,255,0.08);
}

.thumb{
height:210px;
border-radius:18px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
color:white;
margin-bottom:18px;
}

.quiz-title{
font-size:28px;
font-weight:900;
line-height:1.15;
margin-bottom:18px;
}

/* play button */
.play{
width:100%;
border:none;
padding:18px;
border-radius:18px;
font-size:34px;
font-weight:900;
color:black;
background:#39ff14;
box-shadow:
0 0 10px #39ff14,
0 0 20px #39ff14,
0 0 30px #39ff14,
0 7px #1f9d09;
cursor:pointer;
}

.play:active{
transform:translateY(4px);
box-shadow:
0 0 8px #39ff14,
0 0 16px #39ff14,
0 3px #1f9d09;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">⚽ FOOTBALL QUIZ</div>
</div>

<div class="container">

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">GUESS THE PLAYER BY HIS TRANSFERS</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">GUESS THE PLAYER BY CLUB + COUNTRY + SHIRT NUMBER + POSITION</div>
<button class="play">PLAY</button>
</div>

<div class="card">
<div class="thumb">QUIZ IMAGE</div>
<div class="quiz-title">GUESS THE CLUB BY THE NATIONALITY OF ITS PLAYERS</div>
<button class="play">PLAY</button>
</div>

</div>

</body>
</html>
