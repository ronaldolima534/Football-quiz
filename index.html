<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:url('background.png') center/cover fixed;
text-align:center;
color:white;
}

.topbar{
padding:18px 10px 10px;
}

.logo{
width:280px;
max-width:88%;
display:block;
margin:auto;
}

.container{
width:94%;
max-width:620px;
margin:auto;
padding:12px 0 50px;
display:grid;
gap:18px;
}

.card{
background:#27187e;
padding:16px;
border-radius:24px;
box-shadow:0 10px 20px rgba(0,0,0,.22);
}

.thumb{
height:220px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.15;
margin-bottom:14px;
}

.play{
width:100%;
padding:18px;
font-size:32px;
font-weight:900;
border:none;
border-radius:16px;
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
}
</style>
</head>
<body>

<div class="topbar">
<img src="LOGO.png" class="logo">
</div>

<div class="container">

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz1.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY THEIR TRANSFERS</div>
<button class="play" onclick="location.href='transfers.html'">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz2.jpg"></div>
<div class="quiz-title">GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION</div>
<button class="play" onclick="location.href='player-clues.html'">PLAY</button>
</div>

<div class="card">
<div class="thumb"><img src="images/thumbnails/quiz3.jpg"></div>
<div class="quiz-title">GUESS THE CLUB BY PLAYERS NATIONALITY</div>
<button class="play" onclick="location.href='nationality-club.html'">PLAY</button>
</div>

</div>
</body>
</html>
