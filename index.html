<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111);
color:var(--white);
text-align:center;
padding-top:158px;
}

/* TOP */
.top-ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:rgba(10,10,10,.94);
backdrop-filter:blur(8px);
transition:.35s;
}

.lang-top{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
}

.lang-buttons{
display:flex;
gap:8px;
}

.lang-btn{
width:42px;
height:42px;
border-radius:10px;
border:1px solid #333;
background:#1d1d1d;
cursor:pointer;
}

.header{
padding:18px 12px;
border-bottom:1px solid var(--line);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav button{
padding:10px 14px;
border-radius:14px;
border:1px solid var(--line);
background:#1d1d1d;
color:white;
font-weight:900;
cursor:pointer;
}

/* HERO */
.hero{
padding:36px 18px 26px;
}

.hero-box{
max-width:820px;
margin:auto;
background:linear-gradient(145deg,#131313,#1b1b1b);
border:1px solid var(--line);
border-radius:28px;
padding:30px 20px;
}

.hero h1{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:var(--soft);
margin-bottom:18px;
}

.hero-stats{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.stat{
background:#202020;
border:1px solid var(--line);
padding:10px 14px;
border-radius:999px;
font-size:13px;
font-weight:900;
}

/* SECTION */
.section-title{
margin-top:30px;
font-size:28px;
font-weight:900;
}

/* GRID */
.container{
width:94%;
max-width:820px;
margin:20px auto 60px;
display:grid;
gap:20px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:24px;
}

.thumb{
height:210px;
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:22px;
font-weight:900;
margin-bottom:14px;
}

.play{
width:100%;
padding:14px;
border-radius:14px;
background:linear-gradient(145deg,var(--green),var(--green2));
border:none;
font-weight:900;
cursor:pointer;
}

/* CATEGORY */
.cat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
width:94%;
max-width:820px;
margin:20px auto;
}

.cat{
padding:16px;
border-radius:16px;
background:#1d1d1d;
border:1px solid var(--line);
font-weight:900;
cursor:pointer;
}

/* FOOTER */
.footer{
padding:30px;
color:#999;
font-size:14px;
}

</style>
</head>

<body>

<div class="top-ui" id="topUI">

<div class="lang-top">
<div class="lang-wrap">
<div class="lang-buttons" id="languageSelector"></div>
</div>
</div>

<div class="header">
<div class="brand" id="siteName"></div>

<div class="nav">
<button onclick="location.href='index.html'" id="navHome"></button>
<button onclick="location.href='categories.html'" id="navCategories"></button>
<button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
<button onclick="location.href='about.html'" id="navAbout"></button>
<button onclick="location.href='contact.html'" id="navContact"></button>
</div>
</div>

</div>

<!-- HERO -->
<div class="hero">
<div class="hero-box">
<h1 id="heroTitle"></h1>
<p id="heroSub"></p>

<div class="hero-stats">
<div class="stat" id="stat1"></div>
<div class="stat" id="stat2"></div>
<div class="stat" id="stat3"></div>
</div>

</div>
</div>

<!-- CATEGORIES -->
<div class="section-title" id="catTitle"></div>

<div class="cat-grid">
<div class="cat" onclick="goCat('players')" id="cat1"></div>
<div class="cat" onclick="goCat('clubs')" id="cat2"></div>
<div class="cat" onclick="goCat('transfers')" id="cat3"></div>
<div class="cat" onclick="goCat('national-teams')" id="cat4"></div>
</div>

<!-- QUIZZES -->
<div class="section-title" id="featuredTitle"></div>

<div class="container" id="quizContainer"></div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function applyHomeTranslations(){
document.getElementById("siteName").innerText = t("site_name");
document.getElementById("navHome").innerText = t("nav_home");
document.getElementById("navCategories").innerText = t("nav_categories");
document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
document.getElementById("navAbout").innerText = t("nav_about");
document.getElementById("navContact").innerText = t("nav_contact");

document.getElementById("heroTitle").innerText = t("hero_title");
document.getElementById("heroSub").innerText = t("hero_subtitle");

document.getElementById("stat1").innerText = t("hero_stat_1");
document.getElementById("stat2").innerText = t("hero_stat_2");
document.getElementById("stat3").innerText = t("hero_stat_3");

document.getElementById("catTitle").innerText = t("all_quizzes_title");

document.getElementById("cat1").innerText = t("category_players");
document.getElementById("cat2").innerText = t("category_clubs");
document.getElementById("cat3").innerText = t("category_transfers");
document.getElementById("cat4").innerText = t("category_national_teams");

document.getElementById("featuredTitle").innerText = t("featured_quizzes");
}

function goCat(cat){
location.href = "category.html?category=" + cat;
}

function buildHomeQuizzes(){
let html = "";

const quizzes = Object.entries(quizData)
.sort((a,b)=>a[1].homeOrder - b[1].homeOrder);

quizzes.forEach(([mode,quiz])=>{
if(!quiz.showOnHome) return;

html += `
<div class="card">
<div class="thumb">
<img src="${quiz.thumbnail}">
</div>

<div class="quiz-title">${t(quiz.titleKey)}</div>

<button class="play" onclick="location.href='quiz-template.html?mode=${mode}'">
${t("play")}
</button>
</div>
`;
});

document.getElementById("quizContainer").innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyHomeTranslations();
buildHomeQuizzes();

/* scroll hide */
const topUI = document.getElementById("topUI");

function updateTopPadding(){
document.body.style.paddingTop = topUI.offsetHeight + "px";
}

updateTopPadding();
window.addEventListener("resize",updateTopPadding);

let lastScroll = 0;

window.addEventListener("scroll",()=>{
let current = window.scrollY;

if(current > lastScroll && current > 80){
topUI.style.transform = "translateY(-100%)";
}else{
topUI.style.transform = "translateY(0)";
}

lastScroll = current;
});
</script>

</body>
</html>
