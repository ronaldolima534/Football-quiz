<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f0ede5;
text-align:center;
color:white;
}

.topbar{
background:#004643;
padding:28px 10px;
}

.logo{
font-size:72px;
font-weight:900;
line-height:1;
}

.container{
width:94%;
max-width:620px;
margin:auto;
padding:20px 0 50px;
}

.card{
background:#004643;
padding:22px;
border-radius:28px;
margin-bottom:28px;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.thumb{
height:260px;
border-radius:20px;
overflow:hidden;
margin-bottom:18px;
background:#0b5a56;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:30px;
font-weight:900;
line-height:1.15;
margin-bottom:18px;
}

.play{
width:100%;
padding:22px;
font-size:38px;
font-weight:900;
border:none;
border-radius:18px;
background:#39ff14;
color:black;
box-shadow:0 8px #1f9d09;
cursor:pointer;
}

.play:active{
transform:translateY(4px);
box-shadow:0 2px #1f9d09;
}

.ad-slot{
margin:20px 0;
min-height:90px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">⚽ FOOTBALL QUIZ</div>
</div>

<div class="container">

<div class="ad-slot"></div>

<!-- QUIZ 1 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz1.jpg">
</div>

<div class="quiz-title">
GUESS THE PLAYER BY THEIR TRANSFERS
</div>

<button class="play" onclick="window.location.href='transfers.html'">
PLAY
</button>
</div>

<!-- QUIZ 2 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz2.jpg">
</div>

<div class="quiz-title">
GUESS THE PLAYER BY NATIONALITY + CLUB + JERSEY NUMBER + POSITION
</div>

<button class="play" onclick="window.location.href='player-clues.html'">
PLAY
</button>
</div>

<div class="ad-slot"></div>

<!-- QUIZ 3 -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz3.jpg">
</div>

<div class="quiz-title">
GUESS THE CLUB BY PLAYERS NATIONALITY
</div>

<button class="play" onclick="window.location.href='nationality-club.html'">
PLAY
</button>
</div>

<div class="ad-slot"></div>

</div>

</body>
</html>
