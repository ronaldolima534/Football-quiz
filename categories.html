<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#0b0b0b;
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
}

/* HEADER */
.header{
background:rgba(10,10,10,.94);
border-bottom:1px solid var(--line);
padding:18px 12px;
position:sticky;
top:0;
z-index:20;
backdrop-filter:blur(8px);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:white;
border:1px solid #333;
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

/* TITLE */
.page-title{
font-size:36px;
font-weight:900;
margin:30px 0 10px;
}

.page-sub{
color:var(--soft);
margin-bottom:25px;
}

/* CONTAINER */
.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--green);
}

.thumb{
width:100%;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
margin-bottom:12px;
}

.play{
width:100%;
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
cursor:pointer;
}

/* FOOTER */
.footer{
padding:30px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
.page-title{font-size:28px;}
.thumb{height:200px;}
}
</style>
</head>

<body>

<div class="header">
<div class="brand">Football Quiz</div>

<div class="nav">
<button onclick="location.href='index.html'">HOME</button>
<button class="active">CATEGORIES</button>
<button onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
<button onclick="location.href='about.html'">ABOUT</button>
<button onclick="location.href='contact.html'">CONTACT</button>
</div>
</div>

<div class="page-title">All Quizzes</div>
<div class="page-sub">Choose a quiz and start playing</div>

<div class="container" id="categoriesList"></div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>

<script>
function buildCategories(){

const container = document.getElementById("categoriesList");

const quizzes = Object.entries(quizData);

let html = "";

quizzes.forEach(([mode, quiz]) => {

html += `
<div class="card">
  <div class="thumb">
    <img src="${quiz.thumbnail}">
  </div>

  <div class="quiz-title">
    ${quiz.title}
  </div>

  <button class="play"
  onclick="location.href='quiz-template.html?mode=${mode}'">
  PLAY
  </button>
</div>
`;

});

container.innerHTML = html;
}

buildCategories();
</script>

</body>
</html>
