<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - Football Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#0b0b0b;
--card:#151515;
--card2:#1b1b1b;
--line:#2a2a2a;
--green:#22c55e;
--green2:#15803d;
--white:#ffffff;
--soft:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#080808,#111111);
color:var(--white);
text-align:center;
}

.lang-top{
padding:12px 14px 0;
}

.lang-wrap{
width:94%;
max-width:820px;
margin:auto;
display:flex;
justify-content:flex-end;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.lang-label{
font-size:12px;
font-weight:900;
color:#cfcfcf;
letter-spacing:.6px;
}

.lang-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.lang-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:20px;
background:#1d1d1d;
border:1px solid #333;
transition:.2s;
}

.lang-btn:hover{
transform:translateY(-2px);
border-color:var(--green);
}

.lang-btn.active{
background:linear-gradient(145deg,var(--green),var(--green2));
border-color:transparent;
}

.header{
background:rgba(10,10,10,.94);
border-bottom:1px solid var(--line);
padding:18px 12px;
position:sticky;
top:0;
z-index:20;
backdrop-filter:blur(8px);
}

.brand{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.nav button{
padding:10px 16px;
font-size:14px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:var(--card2);
color:white;
border:1px solid #333;
}

.nav .active{
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
border:none;
}

.page-title{
font-size:36px;
font-weight:900;
margin:30px 0 10px;
}

.page-sub{
color:var(--soft);
margin-bottom:25px;
}

.container{
width:94%;
max-width:820px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

.card{
background:linear-gradient(145deg,#141414,#1c1c1c);
border:1px solid #2b2b2b;
padding:16px;
border-radius:26px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--green);
}

.thumb{
width:100%;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.quiz-title{
font-size:24px;
font-weight:900;
margin-bottom:12px;
}

.play{
width:100%;
padding:16px;
font-size:20px;
font-weight:900;
border:none;
border-radius:18px;
background:linear-gradient(145deg,var(--green),var(--green2));
color:black;
cursor:pointer;
}

.footer{
padding:30px;
font-size:14px;
color:#999;
}

@media(max-width:600px){
.page-title{font-size:28px;}
.thumb{height:200px;}
.lang-wrap{justify-content:center;}
}
</style>
</head>

<body>

<div class="lang-top">
  <div class="lang-wrap">
    <div class="lang-label" id="langLabel"></div>
    <div class="lang-buttons" id="languageSelector"></div>
  </div>
</div>

<div class="header">
<div class="brand" id="siteName"></div>

<div class="nav">
<button onclick="location.href='index.html'" id="navHome"></button>
<button class="active" id="navCategories"></button>
<button onclick="location.href='daily-quiz.html'" id="navDailyQuiz"></button>
<button onclick="location.href='about.html'" id="navAbout"></button>
<button onclick="location.href='contact.html'" id="navContact"></button>
</div>
</div>

<div class="page-title" id="pageTitle"></div>
<div class="page-sub" id="pageSub"></div>

<div class="container" id="categoriesList"></div>

<div class="footer">© Football Quiz</div>

<script src="quiz-data.js"></script>
<script src="translations.js"></script>
<script src="language.js"></script>

<script>
function applyCategoriesTranslations(){
  document.documentElement.lang = getSavedLanguage();
  document.getElementById("langLabel").innerText = t("language_label");
  document.getElementById("siteName").innerText = t("site_name");
  document.getElementById("navHome").innerText = t("nav_home");
  document.getElementById("navCategories").innerText = t("nav_categories");
  document.getElementById("navDailyQuiz").innerText = t("nav_daily_quiz");
  document.getElementById("navAbout").innerText = t("nav_about");
  document.getElementById("navContact").innerText = t("nav_contact");
  document.getElementById("pageTitle").innerText = t("all_quizzes_title");
  document.getElementById("pageSub").innerText = t("all_quizzes_subtitle");
}

function buildCategories(){
  const container = document.getElementById("categoriesList");
  const quizzes = Object.entries(quizData);
  let html = "";

  quizzes.forEach(([mode, quiz]) => {
    html += `
    <div class="card">
      <div class="thumb">
        <img src="${quiz.thumbnail}" alt="${t(quiz.titleKey)}">
      </div>

      <div class="quiz-title">
        ${t(quiz.titleKey)}
      </div>

      <button class="play"
      onclick="location.href='quiz-template.html?mode=${mode}'">
      ${t("play")}
      </button>
    </div>
    `;
  });

  container.innerHTML = html;
}

buildLanguageSelector("languageSelector");
applyCategoriesTranslations();
buildCategories();
</script>

</body>
</html>
