<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Quiz - Categories</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HEADER */
.brand{
padding:26px 15px;
font-size:42px;
font-weight:900;
letter-spacing:1px;
background:#151515;
border-bottom:1px solid #2a2a2a;
box-shadow:0 4px 10px rgba(0,0,0,.25);
}

/* HERO */
.hero{
padding:30px 20px 24px;
}

.hero h1{
font-size:38px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cfcfcf;
max-width:650px;
margin:auto;
line-height:1.5;
}

/* GRID */
.container{
width:94%;
max-width:760px;
margin:auto;
padding-bottom:60px;
display:grid;
gap:22px;
}

/* CARD */
.card{
background:#171717;
border:1px solid #2b2b2b;
padding:16px;
border-radius:24px;
box-shadow:0 10px 28px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
border-color:#39ff14;
}

.thumb{
height:220px;
border-radius:18px;
overflow:hidden;
margin-bottom:14px;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.quiz-title{
font-size:24px;
font-weight:900;
line-height:1.2;
margin-bottom:10px;
}

.quiz-desc{
font-size:16px;
color:#bdbdbd;
line-height:1.5;
margin-bottom:14px;
}

/* BUTTON */
.play{
width:100%;
padding:16px;
font-size:22px;
font-weight:900;
border:none;
border-radius:16px;
background:#39ff14;
color:black;
cursor:pointer;
transition:.2s;
}

.play:hover{
transform:scale(1.02);
}

/* NAV */
.nav{
width:94%;
max-width:760px;
margin:22px auto 0;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.nav button{
padding:15px;
font-size:18px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
}

.home-btn{
background:#232323;
color:white;
border:1px solid #333;
}

.daily-btn{
background:#39ff14;
color:black;
}

/* FOOTER */
.footer{
padding:34px 15px;
font-size:14px;
color:#999;
}

/* MOBILE */
@media(max-width:600px){

.brand{
font-size:34px;
padding:22px 10px;
}

.hero h1{
font-size:30px;
}

.hero p{
font-size:16px;
}

.quiz-title{
font-size:21px;
}

.play{
font-size:20px;
}

.thumb{
height:190px;
}

.nav{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="brand">
Football Quiz
</div>

<div class="hero">
<h1>Quiz Categories</h1>
<p>Choose your challenge and prove your football knowledge.</p>
</div>

<div class="nav">
<button class="home-btn" onclick="location.href='index.html'">HOME</button>
<button class="daily-btn" onclick="location.href='daily-quiz.html'">DAILY QUIZ</button>
</div>

<div class="container">

<!-- Transfers -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz1.jpg">
</div>
<div class="quiz-title">Transfers</div>
<div class="quiz-desc">
Guess the player by their career transfers.
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=transfers'">
PLAY NOW
</button>
</div>

<!-- Player Clues -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz2.jpg">
</div>
<div class="quiz-title">Player Clues</div>
<div class="quiz-desc">
Nationality, club, number and position clues.
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=player-clues'">
PLAY NOW
</button>
</div>

<!-- Nationality Club -->
<div class="card">
<div class="thumb">
<img src="images/thumbnails/quiz3.jpg">
</div>
<div class="quiz-title">Clubs by Nationality</div>
<div class="quiz-desc">
Guess the club by the players nationalities.
</div>
<button class="play"
onclick="location.href='quiz-template.html?mode=nationality-club'">
PLAY NOW
</button>
</div>

</div>

<div class="footer">
© Football Quiz
</div>

</body>
</html>
